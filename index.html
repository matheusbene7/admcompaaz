<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPAAz — Sistema Admin v3</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050d1a;--card:#0c1e3a;--card2:#0a1830;
  --border:rgba(59,130,246,0.18);--border2:rgba(59,130,246,0.1);
  --blue:#2563eb;--blue2:#1d4ed8;--blue3:#3b82f6;--blue4:#60a5fa;--blue5:#93c5fd;
  --green:#10b981;--green2:#34d399;--yellow:#fbbf24;--red:#f87171;--purple:#c4b5fd;
  --text:#bfdbfe;--text2:#93c5fd;--text4:#4b6a9b;--text5:#2d4a72;--text6:#1e3a5f;
  --font-d:'Cinzel',serif;--font-b:'Barlow',sans-serif;
  --glass:rgba(12,30,58,0.75);--gb:rgba(59,130,246,0.2);
}
html,body{height:100%;background:linear-gradient(155deg,#050d1a,#080f20,#09142a);}
body{font-family:var(--font-b);color:var(--text);display:flex;min-height:100vh;overflow:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#06101e;}
::-webkit-scrollbar-thumb{background:#1e3a8a;border-radius:3px;}
input,textarea,select{outline:none;font-family:var(--font-b);}
input::placeholder,textarea::placeholder{color:var(--text6);}
canvas{display:block;}

/* ── LOGIN ── */
#ls{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,#030914,#060e1d,#080f22);}
.lc{width:420px;padding:48px 40px;background:linear-gradient(145deg,rgba(12,30,58,.95),rgba(8,20,44,.98));border:1px solid rgba(59,130,246,.25);border-radius:20px;box-shadow:0 32px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05);text-align:center;animation:lfi .6s ease;}
@keyframes lfi{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.lanc{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#2563eb);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 30px rgba(37,99,235,.6);}50%{box-shadow:0 0 50px rgba(37,99,235,.9),0 0 100px rgba(37,99,235,.35);}}
.lt{font-family:var(--font-d);font-size:20px;color:var(--text);letter-spacing:2px;margin-bottom:4px;}
.ls{font-size:11px;color:var(--text5);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
.li{width:100%;background:rgba(8,20,44,.9);border:1px solid rgba(59,130,246,.2);border-radius:10px;color:white;padding:12px 16px;font-size:14px;margin-bottom:14px;transition:all .2s;}
.li:focus{border-color:var(--blue3);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.lb{width:100%;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:white;border:none;border-radius:10px;padding:13px;font-family:var(--font-d);font-size:14px;letter-spacing:1px;cursor:pointer;margin-top:8px;transition:all .2s;box-shadow:0 4px 20px rgba(29,78,216,.4);}
.lb:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(29,78,216,.6);}
.le{color:#f87171;font-size:12px;margin-top:8px;min-height:16px;}
.lh{font-size:10px;color:var(--text6);margin-top:20px;}

/* ── APP ── */
#app{display:flex;width:100%;height:100vh;position:relative;z-index:1;}
#app.hidden{display:none;}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.3;}

/* ── SIDEBAR ── */
#sb{width:220px;flex-shrink:0;background:linear-gradient(180deg,rgba(5,16,30,.97),rgba(7,14,30,.97));border-right:1px solid var(--border2);display:flex;flex-direction:column;padding:14px 8px;position:sticky;top:0;height:100vh;overflow-y:auto;transition:width .25s,opacity .2s;backdrop-filter:blur(20px);}
#sb.col{width:0;padding:0;opacity:0;pointer-events:none;}
.sb-brand{color:var(--text);font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:1.5px;}
.sb-sub{color:var(--text6);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.sb-div{height:1px;background:rgba(59,130,246,.1);margin:8px 0;}
.tgl{font-size:9px;color:var(--text6);text-transform:uppercase;letter-spacing:1.5px;padding:8px 10px 3px;font-weight:700;}
.tb{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font-b);font-size:12px;font-weight:500;transition:all .2s;width:100%;text-align:left;background:transparent;color:var(--text5);border-left:3px solid transparent;margin-bottom:1px;white-space:nowrap;overflow:hidden;}
.tb:hover{background:rgba(59,130,246,.1);color:var(--text2);}
.tb.act{background:rgba(59,130,246,.15);color:var(--blue4);border-left:3px solid var(--blue2);}
.sb-foot{padding-top:10px;border-top:1px solid rgba(59,130,246,.07);font-size:9px;color:var(--text6);text-align:center;}

/* ── MAIN ── */
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#tb{padding:11px 20px;border-bottom:1px solid rgba(59,130,246,.1);background:rgba(5,10,22,.88);backdrop-filter:blur(20px);display:flex;justify-content:space-between;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
#tb h1{color:var(--text);font-family:var(--font-d);font-size:14px;font-weight:700;white-space:nowrap;}
.gs-w{position:relative;flex:1;max-width:360px;}
.gs{width:100%;background:rgba(8,20,44,.8);border:1px solid rgba(59,130,246,.2);border-radius:10px;color:white;padding:7px 12px 7px 34px;font-size:13px;transition:all .2s;}
.gs:focus{border-color:var(--blue3);box-shadow:0 0 0 3px rgba(59,130,246,.12);}
.gsi{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text4);font-size:13px;pointer-events:none;}
.gsr{position:absolute;top:calc(100% + 5px);left:0;right:0;background:linear-gradient(135deg,#0c1e3a,#0a1830);border:1px solid var(--border);border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.6);z-index:200;max-height:320px;overflow-y:auto;display:none;}
.gsr.op{display:block;}
.gri{padding:9px 13px;cursor:pointer;border-bottom:1px solid rgba(59,130,246,.07);transition:background .15s;}
.gri:hover{background:rgba(59,130,246,.12);}
.grt{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-right:5px;background:rgba(59,130,246,.15);color:#93c5fd;}
.tb-r{display:flex;align-items:center;gap:7px;}
.svb{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:white;border:none;border-radius:8px;padding:6px 13px;font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;box-shadow:0 2px 8px rgba(29,78,216,.4);white-space:nowrap;}
.svb:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(29,78,216,.5);}
.lob{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;transition:all .2s;}
#tgb{position:fixed;top:12px;left:222px;z-index:300;background:rgba(29,78,216,.85);border:none;border-radius:7px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;transition:all .25s;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,.4);}
#ct{flex:1;overflow-y:auto;padding:18px 22px;}

/* ── CARDS ── */
.card{background:var(--glass);border:1px solid var(--gb);border-radius:14px;padding:16px;backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);}
.icard{background:rgba(10,26,50,.75);border:1px solid rgba(59,130,246,.12);border-radius:10px;padding:12px;}
.sT{color:var(--text2);font-family:var(--font-d);font-size:12px;font-weight:600;margin-bottom:10px;letter-spacing:.5px;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.col{display:flex;flex-direction:column;gap:10px;}
.row{display:flex;align-items:center;gap:8px;}
.sg{display:flex;flex-direction:column;gap:14px;}

/* ── BUTTONS ── */
.btn{border:none;cursor:pointer;border-radius:7px;font-family:var(--font-b);font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:5px;font-size:12px;}
.btn:hover{opacity:.82;transform:translateY(-1px);}
.btnP{background:#1d4ed8;color:white;padding:6px 12px;}
.btnD{background:rgba(239,68,68,.1);color:#f87171;padding:4px 7px;border:1px solid rgba(239,68,68,.18);}
.btnS{background:rgba(16,185,129,.1);color:#34d399;padding:4px 7px;border:1px solid rgba(16,185,129,.18);}
.btnG{background:rgba(59,130,246,.1);color:#60a5fa;padding:5px 10px;border:1px solid rgba(59,130,246,.18);}

/* ── INPUTS ── */
.inp{background:rgba(8,20,44,.9);border:1px solid rgba(59,130,246,.2);border-radius:8px;color:white;padding:7px 11px;width:100%;font-size:13px;transition:all .2s;}
.inp:focus{border-color:var(--blue3);box-shadow:0 0 0 3px rgba(59,130,246,.12);}
.inpSm{background:rgba(8,20,44,.9);border:1px solid rgba(59,130,246,.18);border-radius:6px;color:white;padding:5px 9px;font-size:12px;transition:all .2s;}
.inpSm:focus{border-color:var(--blue3);}
.inp:read-only,.inpSm:read-only{opacity:.5;cursor:not-allowed;}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.b-blue{background:rgba(59,130,246,.15);color:#93c5fd;}
.b-green{background:rgba(16,185,129,.15);color:#34d399;}
.b-yellow{background:rgba(245,158,11,.15);color:#fbbf24;}
.b-red{background:rgba(239,68,68,.15);color:#f87171;}
.b-purple{background:rgba(139,92,246,.15);color:#c4b5fd;}
.b-gray{background:rgba(100,116,139,.15);color:#94a3b8;}

/* ── MISC ── */
.progress{height:5px;border-radius:3px;background:rgba(59,130,246,.1);overflow:hidden;}
.pFill{height:100%;border-radius:3px;background:linear-gradient(90deg,#1d4ed8,#60a5fa);transition:width .6s;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{color:#2d4a72;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;text-align:left;font-weight:600;border-bottom:1px solid rgba(59,130,246,.1);}
td{padding:6px 8px;border-top:1px solid rgba(59,130,246,.05);}
tr:hover td{background:rgba(59,130,246,.04);}
.kc{background:var(--glass);border:1px solid var(--gb);border-radius:14px;padding:16px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
.kc:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4);}
.kg{position:absolute;width:70px;height:70px;border-radius:50%;filter:blur(28px);opacity:.3;right:-8px;top:-8px;}
.kl{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.kv{font-size:24px;font-weight:700;font-family:var(--font-d);line-height:1;}
.ks{font-size:11px;color:var(--text4);margin-top:5px;}
.ti{display:flex;align-items:center;gap:8px;padding:7px 11px;margin-bottom:4px;border-radius:9px;border:1px solid rgba(59,130,246,.08);background:rgba(15,32,64,.4);transition:all .2s;}
.ti.done{background:rgba(16,185,129,.05);border-color:rgba(16,185,129,.15);}
.ti.done .tt{text-decoration:line-through;color:var(--text5);}
.tt{flex:1;font-size:12px;color:var(--text);}
.chk{width:17px;height:17px;border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid #1d4ed8;background:transparent;transition:all .2s;}
.chk.done{background:#10b981;border-color:#10b981;}
.chk-sm{width:13px;height:13px;border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;border:1.5px solid #1d4ed8;background:transparent;transition:all .2s;}
.chk-sm.done{background:#10b981;border-color:#10b981;}
.rc{border-radius:12px;border:1px solid rgba(59,130,246,.2);padding:14px;background:linear-gradient(135deg,rgba(15,32,64,.8),rgba(13,31,60,.9));backdrop-filter:blur(8px);}
#toast{position:fixed;bottom:22px;right:22px;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:white;padding:11px 18px;border-radius:12px;font-family:var(--font-b);font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(29,78,216,.5);z-index:9999;display:none;animation:su .3s ease;}
@keyframes su{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes fi{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fi .35s ease;}
.ro-only-hide{display:none!important;}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<noscript><p style="color:red;padding:20px;">JavaScript está desabilitado. Ative para usar o sistema.</p></noscript>

<!-- LOGIN -->
<div id="ls">
  <div class="lc">

<!-- APP -->
<div id="app" class="hidden">
  <button id="tgb" onclick="toggleSB()">☰</button>

      <div style="font-size:26px;margin-bottom:5px;">⚓</div>

<script>
// ═══════════════════════════════════════
// BG PARTICLES
// ═══════════════════════════════════════
(function(){
  var c=document.getElementById('bg'),ctx=c.getContext('2d'),pts=[],W,H;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  resize();addEventListener('resize',resize);
  for(var i=0;i<50;i++)pts.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.4+.3,vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.15,a:Math.random()});
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(96,165,250,'+(0.3+p.a*0.3)+')';ctx.fill();});
    for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<100){ctx.beginPath();ctx.strokeStyle='rgba(59,130,246,'+(0.07*(1-d/100))+')';ctx.lineWidth=.6;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}}
    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
var USERS=[
  {user:'sgtgeral',pass:'M@rinha2026',role:'Sargenteante Geral',canEdit:true},
  {user:'auxgeral',pass:'M@rinha2026',role:'Auxiliar do Sargenteante',canEdit:false},
  {user:'supadm',  pass:'M@rinha2026',role:'Supervisor',canEdit:false},
  {user:'fielpg',  pass:'M@rinha2026',role:'Fiel de Pagamento',canEdit:false},
  {user:'encadm',  pass:'M@rinha2026',role:'Encarregado da Adm',canEdit:false},
  {user:'admin',   pass:'M@rinha2026',role:'ADMIN',canEdit:true},
];
var SK='cz_s3';
var _at='dashboard';
var _at='dashboard';
var _canEdit=false;

// ESTADO — inicializado antes de qualquer função de render
var S={
  roles:{
    sargenteante:{title:'Sargenteante Geral',name:'',color:'#1e3a5f',notes:''},
    auxiliar:{title:'Auxiliar do Sargenteante',name:'',color:'#1d4ed8',notes:''},
    supervisor:{title:'Supervisor',name:'',color:'#0284c7',notes:''},
    fiel:{title:'Fiel de Pagamento',name:'',color:'#2563eb',notes:''},
    encAdm:{title:'Encarregado da Adm',name:'',color:'#4f46e5',notes:''},
  },
  tasks:[
    {id:1,role:'sargenteante',task:'Presidir formatura diária',status:'pendente'},
    {id:2,role:'sargenteante',task:'Revisar escala de serviço',status:'pendente'},
    {id:3,role:'fiel',task:'Processar folha de pagamento',status:'pendente'},
    {id:4,role:'supervisor',task:'Supervisionar manutenção predial',status:'pendente'},
  ],
  pautas:[],atas:[],comms:[],
  agendaStatus:{},agendaMes:'MAI',
  nupData:[],osData:[],
  zhOver:{},eventos:[],atividades:[],
  afastamentos:[],tabLabels:{},notas:'',
  relDate:new Date().toISOString().split('T')[0],
  fielTab:'nup',anivMes:new Date().getMonth()+1,
  zhS:'',zhFP:'all',zhFE:'all',zhFS:'all',zhFSt:'all',zhSort:'ant',zhShowAfast:true,
  nupSearch:'',nupFil:'todos',osSearch:'',osFil:'todos',
  fichaSearch:'',fichaPostoFil:'all',fichaExp:null,
};

function doLogin(){
  var u=document.getElementById('lu').value.trim().toLowerCase();
  var p=document.getElementById('lp').value;
  var f=USERS.find(function(x){return x.user===u&&x.pass===p;});
  if(!f){
    var e=document.getElementById('le');
    e.textContent='Usuário ou senha incorretos.';
    setTimeout(function(){e.textContent='';},3000);
    return;
  }
  startApp(f);
}
function doLogout(){
  if(!confirm('Sair do sistema?'))return;
  location.reload();
}
function startApp(f){
  _canEdit=!!f.canEdit;
  var ls=document.getElementById('ls');
  var app=document.getElementById('app');
  var su=document.getElementById('su');
  if(ls)ls.style.display='none';
  if(app)app.classList.remove('hidden');
  if(su)su.textContent='👤 '+f.role+(_canEdit?' ✏️':'');
  setTimeout(function(){
    try{
      initApp();
    }catch(e){
      document.body.innerHTML='<div style="background:#050d1a;color:#f87171;font-family:monospace;padding:30px;min-height:100vh;white-space:pre-wrap;font-size:13px;">'+
        'ERRO FATAL:\n'+e.message+'\n\n'+e.stack+
      '</div>';
    }
  },50);
}
// Sem restauração automática — login sempre exigido

// ═══════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════
var SK2='marinha_v3';
// Limpa TODAS as chaves antigas ao iniciar
(function(){
  try{
    var keysToRemove=[];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&(k.indexOf('marinha')>=0||k.indexOf('cz_')>=0)){keysToRemove.push(k);}
    }
    keysToRemove.forEach(function(k){
      if(k!==SK2)localStorage.removeItem(k);
    });
    // Testa se SK2 atual é JSON válido
    var r=localStorage.getItem(SK2);
    if(r){JSON.parse(r);}
  }catch(e){
    // Se der erro, limpa tudo e começa do zero
    try{localStorage.clear();}catch(e2){}
  }

  try{
    var html=fn();
    c.innerHTML=html||'';
  }catch(e){
    c.innerHTML='<div style="color:#f87171;padding:20px;font-family:monospace;white-space:pre-wrap;font-size:12px;">ERRO em '+_at+':\n'+e.message+'\n\n'+e.stack+'</div>';

  if(_at==='dashboard')setTimeout(drawCharts,80);

}

function drawDonut(id,labels,data,colors){
  var cv=document.getElementById(id);if(!cv)return;
  var p=cv.parentElement;cv.width=p.offsetWidth||200;cv.height=160;
  var ctx=cv.getContext('2d'),cx=cv.width/2,cy=72,r=54,ir=34;
  var tot=data.reduce(function(a,b){return a+b;},0)||1,st=-Math.PI/2;
  data.forEach(function(d,i){var sl=2*Math.PI*(d/tot);ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,st,st+sl);ctx.closePath();ctx.fillStyle=colors[i];ctx.fill();ctx.beginPath();ctx.arc(cx,cy,ir,0,2*Math.PI);ctx.fillStyle='rgba(8,20,44,.9)';ctx.fill();st+=sl;});
  ctx.fillStyle='#bfdbfe';ctx.font='bold 16px Cinzel,serif';ctx.textAlign='center';ctx.fillText(tot,cx,cy+6);
  ctx.fillStyle='#4b6a9b';ctx.font='9px Barlow,sans-serif';ctx.fillText('total',cx,cy+19);
  var lx=4,ly=152;
  labels.forEach(function(l,i){if(data[i]===0)return;ctx.fillStyle=colors[i];ctx.fillRect(lx,ly-8,8,8);ctx.fillStyle='#4b6a9b';ctx.font='9px Barlow,sans-serif';ctx.textAlign='left';ctx.fillText(l.substring(0,8)+' ('+data[i]+')',lx+11,ly);lx+=cv.width/labels.length;});
}
function drawBars(id,labels,d1,d2,c1,c2){
  var cv=document.getElementById(id);if(!cv)return;
  var p=cv.parentElement;cv.width=p.offsetWidth||200;cv.height=160;
  var ctx=cv.getContext('2d'),W=cv.width,H=160,mx=Math.max.apply(null,d1)||1;
  var bw=Math.min(24,(W-30)/(labels.length*2+1)),gap=bw,x0=20;
  ctx.fillStyle=c1;ctx.fillRect(6,6,8,8);ctx.fillStyle='#4b6a9b';ctx.font='9px Barlow,sans-serif';ctx.textAlign='left';ctx.fillText('Total',17,14);
  ctx.fillStyle=c2;ctx.fillRect(60,6,8,8);ctx.fillStyle='#4b6a9b';ctx.fillText('Conc.',71,14);
  labels.forEach(function(l,i){var x=x0+i*(bw*2+gap);var h1=Math.round((d1[i]/mx)*(H-45));var h2=Math.round((d2[i]/mx)*(H-45));
    ctx.fillStyle=c1+'44';ctx.fillRect(x,H-25-h1,bw,h1);ctx.fillStyle=c1;ctx.fillRect(x,H-25-h1,bw,2);
    ctx.fillStyle=c2+'44';ctx.fillRect(x+bw+1,H-25-h2,bw,h2);ctx.fillStyle=c2;ctx.fillRect(x+bw+1,H-25-h2,bw,2);
    ctx.fillStyle='#2d4a72';ctx.font='8px Barlow,sans-serif';ctx.textAlign='center';ctx.fillText(l.substring(0,6),x+bw,H-12);
  });
}

// ZERO-HORA (com filtros + gráficos + afastamentos)

function rZH(){
  var srch=(S.zhS||'').toLowerCase();
  var fPosto=S.zhFP||'all';
  var fEsp=S.zhFE||'all';
  var fSetor=S.zhFS||'all';
  var fStatus=S.zhFSt||'all';
  var sortMode=S.zhSort||'ant';
  var showAfast=S.zhShowAfast!==false;

  var data=ZH_DATA.map(function(m){var ov=(S.zhOver||{})[m.nip]||{};return Object.assign({},m,ov);});

  // Enrich with férias data
  data=data.map(function(m){
    var fer=FERIAS_2026.find(function(f){return f.nip===m.nip;});
    if(fer&&fer.situacao!=='PEGANDO'){m._ferias=fer;}
    return m;
  });

  // Compute embarque/desembarque próximos (TTC)
  var today=new Date();
  var desembarqueProximo=data.filter(function(m){
    if(!m.ttc||m.ttc.indexOf('CONTRATO')<0&&m.ttc.indexOf('/')>0){
      try{var d=m.ttc.split('/');if(d.length===3){var dt=new Date(d[2],d[1]-1,d[0]);var diff=(dt-today)/(1000*60*60*24);return diff>=0&&diff<=90;}}catch(e){}
    }return false;
  }).length;

  // Filtros
  var setores=[]; var seenS={};
  data.forEach(function(m){if(!seenS[m.setor]){seenS[m.setor]=true;setores.push(m.setor);}});
  var esps=[]; var seenE={};
  data.forEach(function(m){if(m.esp&&!seenE[m.esp]){seenE[m.esp]=true;esps.push(m.esp);}});

  var filtered=data.filter(function(m){
    var fp=fPosto==='all'||m.posto===fPosto;
    var fe=fEsp==='all'||m.esp===fEsp;
    var fs=fSetor==='all'||m.setor===fSetor;
    var fst=fStatus==='all'||(m.status||'presente')===fStatus;
    var ss=!srch||(m.nome||'').toLowerCase().indexOf(srch)>=0||(m.posto||'').toLowerCase().indexOf(srch)>=0||
      (m.esp||'').toLowerCase().indexOf(srch)>=0||(m.nip||'').toLowerCase().indexOf(srch)>=0||
      (m.setor||'').toLowerCase().indexOf(srch)>=0||(m.funcao||'').toLowerCase().indexOf(srch)>=0||
      (m.ttc||'').toLowerCase().indexOf(srch)>=0;
    return fp&&fe&&fs&&fst&&ss;
  });

  // Sort
  if(sortMode==='ant'){filtered.sort(function(a,b){var ra=POSTO_ORD.indexOf(a.posto),rb=POSTO_ORD.indexOf(b.posto);if(ra<0)ra=99;if(rb<0)rb=99;return ra!==rb?ra-rb:(a.apresentacao||'').localeCompare(b.apresentacao||'');});}
  else if(sortMode==='nome'){filtered.sort(function(a,b){return(a.nome||'').localeCompare(b.nome||'');});}
  else if(sortMode==='ttc'){filtered.sort(function(a,b){return(a.ttc||'zz').localeCompare(b.ttc||'zz');});}

  var total=data.length;
  var ofTotal=data.filter(function(m){return OFICIAIS.indexOf(m.posto)>=0;}).length;
  var prTotal=data.filter(function(m){return OFICIAIS.indexOf(m.posto)<0;}).length;
  var pres=data.filter(function(m){return(m.status||'presente')==='presente';}).length;
  var ferCount=data.filter(function(m){return m.status==='ferias';}).length;
  var misCount=data.filter(function(m){return m.status==='missao';}).length;
  var afaCount=data.filter(function(m){return m.status==='afastado';}).length;

  // Especialidades de praças
  var espCount={};
  data.filter(function(m){return OFICIAIS.indexOf(m.posto)<0&&m.esp;}).forEach(function(m){espCount[m.esp]=(espCount[m.esp]||0)+1;});
  var espTop=Object.keys(espCount).sort(function(a,b){return espCount[b]-espCount[a];}).slice(0,6);

  function stBadge(m){
    var st=m.status||'presente';

    var ml={presente:'Presente',ferias:'Férias',missao:'Missão',afastado:'Afastado',lsam:'LSAM'};

  // Status filter
  var stFiltBtns=['all','presente','ferias','missao','afastado'].map(function(f){var lbls={all:'Todos',presente:'Presentes ('+pres+')',ferias:'Férias ('+ferCount+')',missao:'Missão ('+misCount+')',afastado:'Afastado ('+afaCount+')'};return'<button class="btn '+(fStatus===f?'btnP':'btnG')+'" onclick="S.zhFSt=\''+f+'\';render()" style="font-size:10px;padding:3px 7px;">'+lbls[f]+'</button>';}).join('');

  // Sort buttons
  var sortBtns=[{k:'ant',l:'⚓ Antiguidade'},{k:'nome',l:'🔤 Nome'},{k:'ttc',l:'📅 TTC'}].map(function(s){return'<button class="btn '+(sortMode===s.k?'btnP':'btnG')+'" onclick="S.zhSort=\''+s.k+'\';render()" style="font-size:11px;">'+s.l+'</button>';}).join('');

  // Afastamentos section
  var afastSection='';
  if(showAfast){
    var feriasList=FERIAS_2026.slice(0,8);
    var manualAfast=(S.afastamentos||[]).slice(0,5);
    afastSection='<div class="card" style="border-left:4px solid #a78bfa;">'+

        feriasList.map(function(m){var sitC={SAFO:'b-green',PARCIAL:'b-yellow',PEGANDO:'b-red'};return'<tr><td>'+pBadge(m.posto)+'</td><td style="color:#bfdbfe;font-weight:600;font-size:12px;">'+esc(m.nome)+'</td><td style="text-align:center;color:#60a5fa;font-weight:600;">'+m.total_dias+'</td><td style="font-size:11px;color:#64748b;">'+m.periodos.slice(0,2).join(' / ')+'</td><td>'+badge(m.situacao,sitC[m.situacao]||'gray')+'</td></tr>';}).join('')+

      '</div>'+
      (manualAfast.length?'<div><div style="font-size:11px;font-weight:600;color:#fbbf24;text-transform:uppercase;margin-bottom:8px;">Afastamentos Manuais (Cursos, Destaque, Saúde)</div>'+
        manualAfast.map(function(a){var tcol={curso:'#60a5fa',destaque:'#fbbf24',saude:'#34d399'};return'<div class="icard" style="margin-bottom:6px;border-left:2px solid '+(tcol[a.tipo]||'#60a5fa')+';"><div class="row"><span class="badge b-blue" style="font-size:10px;">'+esc(a.tipo||'')+'</span><span style="color:#bfdbfe;font-weight:600;font-size:12px;">'+esc(a.nome)+'</span><span style="font-size:11px;color:#4b6a9b;">'+esc(a.posto||'')+(a.inicio?' · '+esc(a.inicio):'')+(a.fim?' → '+esc(a.fim):'')+'</span><span class="badge '+(a.status==='concluido'?'b-green':'b-yellow')+'">'+( a.status==='concluido'?'Concluído':'Em curso')+'</span></div></div>';}).join('')+
      '</div>':'<div style="color:#1e3a5f;font-size:12px;text-align:center;padding:8px;">Nenhum afastamento manual registrado. <button class="btn btnG" onclick="nav(\'sgtgeral\')" style="font-size:11px;">Registrar no Sargenteante Geral</button></div>')+
    '</div>';
  }else{
    afastSection='<div class="icard" style="text-align:center;padding:12px;"><button class="btn btnG" onclick="S.zhShowAfast=true;render()">🏖 Mostrar Afastamentos Previstos e Efetivados</button></div>';
  }

  // Table rows
  var tableRows='';
  var curGrp='';
  filtered.forEach(function(m){
    if(sortMode==='ant'){var grp=m.posto||'?';if(grp!==curGrp){curGrp=grp;tableRows+='<tr><td colspan="9" style="background:rgba(29,78,216,.1);color:#93c5fd;font-family:var(--font-d);font-size:11px;font-weight:600;padding:6px 10px;">'+esc(grp)+'<span style="float:right;color:#4b6a9b;font-family:var(--font-b);font-weight:400;font-size:10px;">'+(OFICIAIS.indexOf(grp)>=0?'— OFICIAIS':'— PRAÇAS')+'</span></td></tr>';}}

    var ttcWarn='';

function drawZHCharts(){
  var pres=ZH_DATA.filter(function(m){return(m.status||'presente')==='presente';}).length;
  var fer=ZH_DATA.filter(function(m){return m.status==='ferias';}).length;
  var mis=ZH_DATA.filter(function(m){return m.status==='missao';}).length;
  var afa=ZH_DATA.filter(function(m){return m.status==='afastado';}).length;
  drawDonut('zh-ch1',['Presentes','Férias','Missão','Afastado'],[pres,fer,mis,afa],['#34d399','#a78bfa','#fbbf24','#f87171']);
  var ofT=ZH_DATA.filter(function(m){return OFICIAIS.indexOf(m.posto)>=0;}).length;
  var prT=ZH_DATA.filter(function(m){return OFICIAIS.indexOf(m.posto)<0;}).length;
  drawDonut('zh-ch2',['Oficiais','Praças'],[ofT,prT],['#c4b5fd','#60a5fa']);
  // esp chart

function getAnivSemana(){
  var hoje=new Date();
  var result=[];
  for(var i=0;i<7;i++){
    var d=new Date(hoje);d.setDate(hoje.getDate()+i);
    var dm=d.getDate(),mm=d.getMonth()+1;
    ANIVERSARIANTES.filter(function(a){return a.dia===dm&&a.mes===mm;}).forEach(function(a){
      result.push(Object.assign({},a,{_date:d,_hoje:i===0}));
    });
  }
  return result;
}
function getAnivMes(m){return ANIVERSARIANTES.filter(function(a){return a.mes===m;}).sort(function(a,b){return a.dia-b.dia;});}

function rAniversario(){
  var hoje=new Date();var mesAtual=hoje.getMonth()+1;

  }).join('');

  function anivCard(a,showDate){

            '<div class="row" style="gap:6px;margin-top:2px;">'+pBadge(a.posto)+'<span style="font-size:11px;color:#4b6a9b;">'+esc(a.cqea||'')+'</span></div>' +

  var and=ativs.filter(function(a){return a.status==='andamento';});
  var con=ativs.filter(function(a){return a.status==='concluida';});
  var fmtD=new Date(dt+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  var prev=new Date(dt+'T12:00:00');prev.setDate(prev.getDate()-1);
  var next=new Date(dt+'T12:00:00');next.setDate(next.getDate()+1);
  function atvCard(a){var id=String(a.id);var sm={iniciada:{c:'#93c5fd',bg:'rgba(59,130,246,.12)',l:'Iniciada'},andamento:{c:'#fbbf24',bg:'rgba(245,158,11,.12)',l:'Andamento'},concluida:{c:'#34d399',bg:'rgba(16,185,129,.12)',l:'Concluída'}};var s=sm[a.status]||sm.iniciada;
    return'<div class="icard" style="margin-bottom:8px;border-left:3px solid '+s.c+';"><div class="row" style="justify-content:space-between;"><div style="flex:1;"><div class="row" style="gap:5px;margin-bottom:3px;"><span style="background:'+s.bg+';color:'+s.c+';padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;">'+s.l+'</span>'+(a.hora_inicio?'<span style="font-size:10px;color:#4b6a9b;">'+esc(a.hora_inicio)+(a.hora_fim?' → '+esc(a.hora_fim):'')+'</span>':'')+'</div><div style="color:#bfdbfe;font-weight:600;font-size:13px;">'+esc(a.atividade||'')+'</div>'+(a.militar?'<div style="font-size:11px;color:#93c5fd;">👤 '+esc(a.militar)+(a.posto?' · '+esc(a.posto):'')+'</div>':'')+( a.obs?'<div style="font-size:11px;color:#64748b;">'+esc(a.obs)+'</div>':'')+'</div><div class="row" style="gap:4px;">'+(a.status!=='concluida'?'<button class="btn btnS" onclick="advAtv(\''+id+'\')" style="font-size:10px;padding:3px 7px;">'+(a.status==='iniciada'?'→ And.':'→ Conc.')+'</button>':'')+'<button class="btn btnD" onclick="delAtv(\''+id+'\')" style="font-size:10px;padding:2px 5px;">🗑</button></div></div></div>';}
  function col(items,title,c,empty){return'<div><div style="color:'+c+';font-size:11px;font-weight:700;margin-bottom:8px;text-transform:uppercase;">'+title+' ('+items.length+')</div>'+(items.length===0?'<div class="icard" style="text-align:center;padding:14px;color:#1e3a5f;font-size:12px;">'+empty+'</div>':items.map(atvCard).join(''))+'</div>';}
  return'<div class="sg">'+
    '<div class="row" style="justify-content:space-between;flex-wrap:wrap;gap:8px;">'+
      '<div><div style="color:#93c5fd;font-family:var(--font-d);font-size:15px;font-weight:600;">📊 Relatório Diário</div></div>'+
      '<button class="btn btnP" onclick="openAddAtv()">+ Atividade</button>'+
    '</div>'+
    '<div class="card" style="padding:11px;">'+
      '<div class="row" style="justify-content:space-between;align-items:center;">'+
        '<button class="btn btnG" onclick="setRelDate(\''+prev.toISOString().split('T')[0]+'\')" style="font-size:17px;">◀</button>'+
        '<div style="text-align:center;"><div style="color:#bfdbfe;font-weight:600;font-size:14px;">'+fmtD+'</div><input type="date" class="inpSm" value="'+esc(dt)+'" onchange="setRelDate(this.value)" style="margin-top:5px;"></div>'+
        '<button class="btn btnG" onclick="setRelDate(\''+next.toISOString().split('T')[0]+'\')" style="font-size:17px;">▶</button>'+
      '</div>'+
    '</div>'+
    '<div class="g4">'+[['Total',ativs.length,'#60a5fa'],['Iniciadas',ini.length,'#93c5fd'],['Andamento',and.length,'#fbbf24'],['Concluídas',con.length,'#34d399']].map(function(k){return'<div class="icard" style="text-align:center;padding:12px;border-left:3px solid '+k[2]+';"><div style="font-size:9px;color:#4b6a9b;text-transform:uppercase;margin-bottom:4px;">'+k[0]+'</div><div style="font-size:22px;font-weight:700;color:'+k[2]+';">'+k[1]+'</div></div>';}).join('')+'</div>'+
    '<div id="add-atv-form" style="display:none;" class="card">'+
      '<div style="color:#93c5fd;font-family:var(--font-d);font-size:14px;margin-bottom:14px;">+ Nova Atividade</div>'+
      '<div class="g2" style="gap:10px;margin-bottom:10px;"><div><label style="font-size:10px;color:#2d4a72;display:block;margin-bottom:3px;">Militar</label><input id="a-mil" class="inp" placeholder="Nome"></div><div><label style="font-size:10px;color:#2d4a72;display:block;margin-bottom:3px;">Posto</label><input id="a-pos" class="inp" placeholder="Ex: 2SG"></div></div>'+
      '<div style="margin-bottom:10px;"><label style="font-size:10px;color:#2d4a72;display:block;margin-bottom:3px;">Atividade *</label><input id="a-atv" class="inp" placeholder="Descreva..."></div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px;">'+
        '<div><label style="font-size:10px;color:#2d4a72;display:block;margin-bottom:3px;">Categoria</label><select id="a-cat" class="inp"><option>Administrativa</option><option>Pessoal</option><option>Financeiro</option><option>Comunicações</option><option>Instrução</option><option>Apoio</option></select></div>'+
        '<div><label style="font-size:10px;color:#2d4a72;display:block;margin-bottom:3px;">Status</label><select id="a-sta" class="inp"><option value="iniciada">Iniciada</option><option value="andamento">Em Andamento</option><option value="concluida">Concluída</option></select></div>'+
        '<div><label style="font-size:10px;color:#2d4a72;display:block;margin-bottom:3px;">H. Início</label><input id="a-hi" class="inp" type="time"></div>'+
        '<div><label style="font-size:10px;color:#2d4a72;display:block;margin-bottom:3px;">H. Fim</label><input id="a-hf" class="inp" type="time"></div>'+
      '</div>'+
      '<div style="margin-bottom:12px;"><label style="font-size:10px;color:#2d4a72;display:block;margin-bottom:3px;">Observações</label><input id="a-obs" class="inp" placeholder="Detalhes..."></div>'+
      '<div class="row" style="gap:8px;"><button class="btn btnP" onclick="saveAtv()">✓ Registrar</button><button class="btn btnG" onclick="document.getElementById(\'add-atv-form\').style.display=\'none\'">Cancelar</button></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;">'+col(ini,'🔵 Iniciadas','#93c5fd','Nenhuma')+col(and,'🟡 Andamento','#fbbf24','Nenhuma')+col(con,'🟢 Concluídas','#34d399','Nenhuma')+'</div>'+
  '</div>';
}

// ═══════════════════════════════════════
// NOTAS
// ═══════════════════════════════════════
function rNotas(){
  return'<div class="card" style="height:calc(100vh - 115px);"><div class="sT">📝 Notas Rápidas</div>'+
    '<textarea class="inp" style="width:100%;height:calc(100% - 46px);resize:none;font-size:13px;line-height:1.7;padding:12px;border-radius:10px;" '+(canEdit()?'':'readonly')+' placeholder="'+(canEdit()?'Digite suas notas…':'Modo leitura — sem permissão de edição')+'" oninput="S.notas=this.value;deb(\'notas\',saveS,800)">'+esc(S.notas||'')+'</textarea>'+
    '<div style="font-size:10px;color:#2d4a72;margin-top:5px;text-align:right;">'+(canEdit()?'Auto-salvo ao digitar':'Somente leitura')+'</div>'+
  '</div>';
}

// ═══════════════════════════════════════
// ACTION HANDLERS
// ═══════════════════════════════════════
// Tarefas
function addTask(role){if(!canEdit())return;var txt=prompt('Nova tarefa:');if(!txt)return;S.tasks.push({id:Date.now(),role:role,task:txt.trim(),status:'pendente'});saveS();render();updateTB();}
function delTask(id){S.tasks=S.tasks.filter(function(t){return String(t.id)!==String(id);});saveS();render();updateTB();}
function cycleTask(id){var cycle=['pendente','andamento','concluido'];var t=S.tasks.find(function(x){return String(x.id)===String(id);});if(t){var i=cycle.indexOf(t.status);t.status=cycle[(i+1)%cycle.length];saveS();render();updateTB();}}

// Eventos
function addEvento(){if(!canEdit())return;var t=prompt('Título:');if(!t)return;var d=prompt('Data:','');var o=prompt('Obs:','');S.eventos.push({id:Date.now(),titulo:t.trim(),data:d.trim(),obs:o.trim(),status:'previsto'});saveS();render();}
function delEvento(id){S.eventos=S.eventos.filter(function(e){return String(e.id)!==String(id);});saveS();render();}
function togEvento(id){var e=S.eventos.find(function(x){return String(x.id)===String(id);});if(e){e.status=e.status==='realizado'?'previsto':'realizado';saveS();render();}}

// Agenda
function toggleAg(key){if(!S.agendaStatus)S.agendaStatus={};S.agendaStatus[key]=!S.agendaStatus[key];saveS();render();}

// NUP
function addNup(){if(!canEdit())return;var n=prompt('Número NUP:');if(!n)return;var a=prompt('Assunto:','')||'';var o=prompt('Obs:','')||'';S.nupData.push({nup:n.trim(),assunto:a,data_entrada:new Date().toISOString().split('T')[0],obs:o,status:'pendente'});saveS();render();showToast('✓ NUP adicionado!');}
function delNup(nup){S.nupData=S.nupData.filter(function(x){return x.nup!==nup;});saveS();render();}
function togNup(nup){var n=S.nupData.find(function(x){return x.nup===nup;});if(n){n.status=n.status==='concluido'?'pendente':'concluido';saveS();render();}}

// OS
function addOS(){
  if(!canEdit())return;
  var num=prompt('Número da OS (ex: OS 001/2026):');if(!num)return;
  var tipos=['pagamento','pessoal','manutencao','instrucao','logistica','outro'];
  var tipo=prompt('Tipo ('+tipos.join('/')+'):','outro')||'outro';
  var assunto=prompt('Assunto:','')||'';
  var resp=prompt('Militar Responsável:','')||'';
  var prazInt=prompt('Prazo Interno (AAAA-MM-DD):','')||'';
  var prazExt=prompt('Prazo Externo (AAAA-MM-DD):','')||'';
  var obs=prompt('Observações:','')||'';
  S.osData.push({id:Date.now(),numero:num.trim(),tipo:tipo.trim(),assunto:assunto.trim(),responsavel:resp.trim(),prazo_interno:prazInt.trim(),prazo_externo:prazExt.trim(),obs:obs.trim(),status:'pendente'});
  saveS();render();showToast('✓ OS adicionada!');
}
function advOS(id){var o=(S.osData||[]).find(function(x){return String(x.id)===String(id);});if(!o)return;if(o.status==='pendente')o.status='andamento';else if(o.status==='andamento')o.status='concluido';saveS();render();}
function delOS(id){S.osData=(S.osData||[]).filter(function(x){return String(x.id)!==String(id);});saveS();render();}

// ZH
function cycleZhSt(nip){var cycle=['presente','ferias','missao','afastado'];if(!S.zhOver)S.zhOver={};if(!S.zhOver[nip])S.zhOver[nip]={};var cur=S.zhOver[nip].status||'presente';var i=cycle.indexOf(cur);S.zhOver[nip].status=cycle[(i+1)%cycle.length];saveS();render();}

// Pautas
function addPauta(){if(!canEdit())return;var t=prompt('Título da pauta:');if(!t)return;var d=prompt('Data:',new Date().toLocaleDateString('pt-BR'))||'';if(!S.pautas)S.pautas=[];S.pautas.push({id:Date.now(),titulo:t.trim(),data:d.trim(),status:'aberta',itens:[]});saveS();render();}
function delPauta(id){S.pautas=(S.pautas||[]).filter(function(p){return String(p.id)!==String(id);});saveS();render();}
function addItemPauta(id){if(!canEdit())return;var txt=prompt('Novo item:');if(!txt)return;var pa=(S.pautas||[]).find(function(p){return String(p.id)===String(id);});if(pa){if(!pa.itens)pa.itens=[];pa.itens.push({id:Date.now(),texto:txt.trim(),done:false});}saveS();render();}
function toggleItemPauta(pid,iid){var pa=(S.pautas||[]).find(function(p){return String(p.id)===String(pid);});if(pa){var it=(pa.itens||[]).find(function(i){return String(i.id)===String(iid);});if(it)it.done=!it.done;}saveS();render();}
function addAta(){if(!canEdit())return;var t=prompt('Título da ata:');if(!t)return;var d=prompt('Data:',new Date().toLocaleDateString('pt-BR'))||'';var c=prompt('Conteúdo resumido:','')||'';if(!S.atas)S.atas=[];S.atas.push({id:Date.now(),titulo:t.trim(),data:d.trim(),conteudo:c.trim()});saveS();render();}
function delAta(id){S.atas=(S.atas||[]).filter(function(a){return String(a.id)!==String(id);});saveS();render();}
function addComm(){if(!canEdit())return;var t=prompt('Título:');if(!t)return;var dest=prompt('Destinatário:','')||'';var corpo=prompt('Conteúdo:','')||'';if(!S.comms)S.comms=[];S.comms.push({id:Date.now(),titulo:t.trim(),dest:dest.trim(),corpo:corpo.trim(),data:new Date().toLocaleDateString('pt-BR'),status:'pendente'});saveS();render();}
function togComm(id){var c=(S.comms||[]).find(function(x){return String(x.id)===String(id);});if(c){c.status=c.status==='enviado'?'pendente':'enviado';saveS();render();}}
function delComm(id){S.comms=(S.comms||[]).filter(function(x){return String(x.id)!==String(id);});saveS();render();}

// Afastamentos manuais
function addAfast(tipo){if(!canEdit())return;var nome=prompt('Nome do militar:');if(!nome)return;var posto=prompt('Posto:','')||'';var ini=prompt('Data início (DD/MM/AAAA):','')||'';var fim=prompt('Data fim (DD/MM/AAAA):','')||'';var obs=prompt('Obs (motivo, local):','')||'';if(!S.afastamentos)S.afastamentos=[];S.afastamentos.push({id:Date.now(),tipo:tipo,nome:nome.trim(),posto:posto.trim(),inicio:ini.trim(),fim:fim.trim(),obs:obs.trim(),status:'andamento'});saveS();render();showToast('✓ Registrado!');}
function delAfast(id){S.afastamentos=(S.afastamentos||[]).filter(function(x){return String(x.id)!==String(id);});saveS();render();}

// Relatório
function setRelDate(d){S.relDate=d;saveS();render();}
function openAddAtv(){render();setTimeout(function(){var f=document.getElementById('add-atv-form');if(f)f.style.display='block';},50);}
function saveAtv(){var atv=(document.getElementById('a-atv')||{}).value||'';if(!atv){showToast('Preencha a atividade!');return;}if(!S.atividades)S.atividades=[];S.atividades.push({id:Date.now(),data:S.relDate||new Date().toISOString().split('T')[0],militar:(document.getElementById('a-mil')||{}).value||'',posto:(document.getElementById('a-pos')||{}).value||'',atividade:atv.trim(),categoria:(document.getElementById('a-cat')||{}).value||'',status:(document.getElementById('a-sta')||{}).value||'iniciada',hora_inicio:(document.getElementById('a-hi')||{}).value||'',hora_fim:(document.getElementById('a-hf')||{}).value||'',obs:(document.getElementById('a-obs')||{}).value||''});saveS();render();showToast('✓ Registrado!');}
function advAtv(id){var a=(S.atividades||[]).find(function(x){return String(x.id)===String(id);});if(!a)return;if(a.status==='iniciada')a.status='andamento';else if(a.status==='andamento')a.status='concluida';saveS();render();}
function delAtv(id){S.atividades=(S.atividades||[]).filter(function(x){return String(x.id)!==String(id);});saveS();render();}

// Sidebar
var _sbC=false;
function toggleSB(){var sb=document.getElementById('sb'),btn=document.getElementById('tgb');_sbC=!_sbC;sb.classList.toggle('col',_sbC);btn.textContent=_sbC?'☰':'✕';btn.style.left=_sbC?'8px':'222px';}

// Save
function manualSave(){saveS();var b=document.getElementById('svb');if(b){var orig=b.innerHTML;b.innerHTML='✓ Salvo!';b.style.background='linear-gradient(135deg,#059669,#10b981)';setTimeout(function(){b.innerHTML=orig;b.style.background='linear-gradient(135deg,#1d4ed8,#2563eb)';},2000);}showToast('✓ Todas as alterações salvas!');}
setInterval(function(){if(sessionStorage.getItem(SK))saveS();},60000);

// INIT
function initApp(){
  _at='dashboard';
  try{ buildNav(); }catch(e){ console.error('buildNav',e); }
  try{ buildGSI(); }catch(e){ console.error('buildGSI',e); }
  try{ render(); }catch(e){
    var c=document.getElementById('ct');
    if(c)c.innerHTML='<div style="color:#f87171;padding:20px;font-family:monospace;white-space:pre-wrap;">ERRO RENDER:\n'+e.message+'</div>';
  }
  try{ updateTB(); }catch(e){}
}
</script>
</body>
</html>
