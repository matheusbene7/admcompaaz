<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPAAz — Sistema Admin v3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050d1a;--card:#0c1e3a;--card2:#0a1830;
  --border:rgba(59,130,246,0.18);--border2:rgba(59,130,246,0.1);
  --blue:#2563eb;--blue2:#1d4ed8;--blue3:#3b82f6;--blue4:#60a5fa;--blue5:#93c5fd;
  --green:#10b981;--green2:#34d399;--yellow:#fbbf24;--red:#f87171;--purple:#c4b5fd;
  --text:#bfdbfe;--text2:#93c5fd;--text4:#4b6a9b;--text5:#2d4a72;--text6:#1e3a5f;
  --font-d:'Playfair Display',Georgia,serif;--font-b:'Inter','Segoe UI',system-ui,sans-serif;
  --glass:rgba(12,30,58,0.75);--gb:rgba(59,130,246,0.2);
}
html,body{height:100%;background:linear-gradient(155deg,#050d1a,#080f20,#09142a);}
body{font-family:var(--font-b);color:var(--text);display:flex;min-height:100vh;overflow:hidden;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#06101e;}
::-webkit-scrollbar-thumb{background:#1e3a8a;border-radius:3px;}
input,textarea,select{outline:none;font-family:var(--font-b);}
input::placeholder,textarea::placeholder{color:var(--text6);}
canvas{display:block;}

/* ── LOGIN ── */
#ls{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,#030914,#060e1d,#080f22);}
.lc{width:420px;padding:48px 40px;background:linear-gradient(145deg,rgba(12,30,58,.95),rgba(8,20,44,.98));border:1px solid rgba(59,130,246,.25);border-radius:20px;box-shadow:0 32px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05);text-align:center;animation:lfi .6s ease;}
@keyframes lfi{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.lanc{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#2563eb);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 30px rgba(37,99,235,.6);}50%{box-shadow:0 0 50px rgba(37,99,235,.9),0 0 100px rgba(37,99,235,.35);}}
.lt{font-family:var(--font-d);font-size:19px;color:var(--text);letter-spacing:1.5px;margin-bottom:4px;}
.ls{font-size:11px;color:var(--text5);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
.li{width:100%;background:rgba(8,20,44,.9);border:1px solid rgba(59,130,246,.2);border-radius:10px;color:white;padding:12px 16px;font-size:14px;margin-bottom:14px;transition:all .2s;}
.li:focus{border-color:var(--blue3);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.lb{width:100%;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:white;border:none;border-radius:10px;padding:13px;font-family:var(--font-d);font-size:14px;letter-spacing:1px;cursor:pointer;margin-top:8px;transition:all .2s;box-shadow:0 4px 20px rgba(29,78,216,.4);}
.lb:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(29,78,216,.6);}
.le{color:#f87171;font-size:12px;margin-top:8px;min-height:16px;}
.lh{font-size:10px;color:var(--text6);margin-top:20px;}

/* ── APP ── */
#app{display:flex;width:100%;height:100vh;position:relative;z-index:1;}
#app.hidden{display:none;}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.3;}

/* ── SIDEBAR ── */
#sb{width:220px;flex-shrink:0;background:linear-gradient(180deg,rgba(5,16,30,.97),rgba(7,14,30,.97));border-right:none;box-shadow:2px 0 20px rgba(0,0,0,.4),1px 0 0 rgba(200,168,75,.08);display:flex;flex-direction:column;padding:14px 8px;position:sticky;top:0;height:100vh;overflow-y:auto;transition:width .25s,opacity .2s;backdrop-filter:blur(20px);}
#sb.col{width:0;padding:0;opacity:0;pointer-events:none;}
.sb-brand{color:var(--text);font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:1px;}
.sb-sub{color:var(--text6);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.sb-div{height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.15),transparent);margin:6px 4px;}
.tgl{font-size:8px;color:rgba(200,168,75,.7);text-transform:uppercase;letter-spacing:3px;padding:18px 8px 5px;font-weight:700;position:relative;}.tgl::before{content:"";position:absolute;top:10px;left:8px;right:8px;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,75,.25),rgba(59,130,246,.15),transparent);}
.tb{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font-b);font-size:13px;font-weight:500;transition:all .2s;width:100%;text-align:left;background:transparent;color:var(--text5);border-left:3px solid transparent;margin-bottom:1px;white-space:nowrap;overflow:hidden;}
.tb:hover{background:rgba(59,130,246,.1);color:var(--text2);}
.tb.act{background:rgba(59,130,246,.15);color:var(--blue4);border-left:3px solid var(--blue2);}
.sb-foot{padding-top:10px;border-top:1px solid rgba(59,130,246,.07);font-size:9px;color:var(--text6);text-align:center;}

/* ── MAIN ── */
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#tb{padding:11px 20px;border-bottom:1px solid rgba(59,130,246,.1);background:rgba(5,10,22,.88);backdrop-filter:blur(20px);display:flex;justify-content:space-between;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
#tb h1{color:var(--text);font-family:var(--font-d);font-size:15px;font-weight:700;white-space:nowrap;letter-spacing:.3px;}
.gs-w{position:relative;flex:1;max-width:360px;}
.gs{width:100%;background:rgba(8,20,44,.8);border:1px solid rgba(59,130,246,.2);border-radius:10px;color:white;padding:7px 12px 7px 34px;font-size:13px;transition:all .2s;}
.gs:focus{border-color:var(--blue3);box-shadow:0 0 0 3px rgba(59,130,246,.12);}
.gsi{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text4);font-size:13px;pointer-events:none;}
.gsr{position:absolute;top:calc(100% + 5px);left:0;right:0;background:linear-gradient(135deg,#0c1e3a,#0a1830);border:1px solid var(--border);border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.6);z-index:200;max-height:320px;overflow-y:auto;display:none;}
.gsr.op{display:block;}
.gri{padding:9px 13px;cursor:pointer;border-bottom:1px solid rgba(59,130,246,.07);transition:background .15s;}
.gri:hover{background:rgba(59,130,246,.12);}
.grt{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-right:5px;background:rgba(59,130,246,.15);color:#93c5fd;}
.tb-r{display:flex;align-items:center;gap:7px;}
.svb{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:white;border:none;border-radius:8px;padding:6px 13px;font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;box-shadow:0 2px 8px rgba(29,78,216,.4);white-space:nowrap;}
.svb:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(29,78,216,.5);}
.lob{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;transition:all .2s;}
#tgb{position:fixed;top:12px;left:222px;z-index:300;background:rgba(29,78,216,.85);border:none;border-radius:7px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;transition:all .25s;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,.4);}
#ct{flex:1;overflow-y:auto;padding:18px 22px;}

/* ── CARDS ── */
.card{background:var(--glass);border:1px solid var(--gb);border-radius:14px;padding:16px;backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);}
.icard{background:rgba(10,26,50,.75);border:1px solid rgba(59,130,246,.12);border-radius:10px;padding:12px;}
.sT{color:var(--text2);font-family:var(--font-d);font-size:12px;font-weight:700;margin-bottom:10px;letter-spacing:.3px;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.col{display:flex;flex-direction:column;gap:10px;}
.row{display:flex;align-items:center;gap:8px;}
.sg{display:flex;flex-direction:column;gap:14px;}

/* ── BUTTONS ── */
.btn{border:none;cursor:pointer;border-radius:7px;font-family:var(--font-b);font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:5px;font-size:12px;}
.btn:hover{opacity:.82;transform:translateY(-1px);}
.btnP{background:#1d4ed8;color:white;padding:6px 12px;}
.btnD{background:rgba(239,68,68,.1);color:#f87171;padding:4px 7px;border:1px solid rgba(239,68,68,.18);}
.btnS{background:rgba(16,185,129,.1);color:#34d399;padding:4px 7px;border:1px solid rgba(16,185,129,.18);}
.btnG{background:rgba(59,130,246,.1);color:#60a5fa;padding:5px 10px;border:1px solid rgba(59,130,246,.18);}

/* ── INPUTS ── */
.inp{background:rgba(8,20,44,.9);border:1px solid rgba(59,130,246,.2);border-radius:8px;color:white;padding:7px 11px;width:100%;font-size:13px;transition:all .2s;}
.inp:focus{border-color:var(--blue3);box-shadow:0 0 0 3px rgba(59,130,246,.12);}
.inpSm{background:rgba(8,20,44,.9);border:1px solid rgba(59,130,246,.18);border-radius:6px;color:white;padding:5px 9px;font-size:12px;transition:all .2s;}
.inpSm:focus{border-color:var(--blue3);}
.inp:read-only,.inpSm:read-only{opacity:.5;cursor:not-allowed;}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.b-blue{background:rgba(59,130,246,.15);color:#93c5fd;}
.b-green{background:rgba(16,185,129,.15);color:#34d399;}
.b-yellow{background:rgba(245,158,11,.15);color:#fbbf24;}
.b-red{background:rgba(239,68,68,.15);color:#f87171;}
.b-purple{background:rgba(139,92,246,.15);color:#c4b5fd;}
.b-gray{background:rgba(100,116,139,.15);color:#94a3b8;}

/* ── MISC ── */
.progress{height:5px;border-radius:3px;background:rgba(59,130,246,.1);overflow:hidden;}
.pFill{height:100%;border-radius:3px;background:linear-gradient(90deg,#1d4ed8,#60a5fa);transition:width .6s;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{color:#2d4a72;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;text-align:left;font-weight:600;border-bottom:1px solid rgba(59,130,246,.1);}
td{padding:6px 8px;border-top:1px solid rgba(59,130,246,.05);}
tr:hover td{background:rgba(59,130,246,.04);}
.kc{background:var(--glass);border:1px solid var(--gb);border-radius:14px;padding:16px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
.kc:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4);}
.kg{position:absolute;width:70px;height:70px;border-radius:50%;filter:blur(28px);opacity:.3;right:-8px;top:-8px;}
.kl{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.kv{font-size:24px;font-weight:700;font-family:var(--font-d);line-height:1.1;}
.ks{font-size:11px;color:var(--text4);margin-top:5px;}
.ti{display:flex;align-items:center;gap:8px;padding:7px 11px;margin-bottom:4px;border-radius:9px;border:1px solid rgba(59,130,246,.08);background:rgba(15,32,64,.4);transition:all .2s;}
.ti.done{background:rgba(16,185,129,.05);border-color:rgba(16,185,129,.15);}
.ti.done .tt{text-decoration:line-through;color:var(--text5);}
.tt{flex:1;font-size:12px;color:var(--text);}
.chk{width:17px;height:17px;border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid #1d4ed8;background:transparent;transition:all .2s;}
.chk.done{background:#10b981;border-color:#10b981;}
.chk-sm{width:13px;height:13px;border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;border:1.5px solid #1d4ed8;background:transparent;transition:all .2s;}
.chk-sm.done{background:#10b981;border-color:#10b981;}
.rc{border-radius:12px;border:1px solid rgba(59,130,246,.2);padding:14px;background:linear-gradient(135deg,rgba(15,32,64,.8),rgba(13,31,60,.9));backdrop-filter:blur(8px);}
#toast{position:fixed;bottom:22px;right:22px;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:white;padding:11px 18px;border-radius:12px;font-family:var(--font-b);font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(29,78,216,.5);z-index:9999;display:none;animation:su .3s ease;}
@keyframes su{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes fi{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fi .35s ease;}
.ro-only-hide{display:none!important;}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<noscript><p style="color:red;padding:20px;">JavaScript está desabilitado. Ative para usar o sistema.</p></noscript>

<!-- LOGIN -->
<div id="ls">
  <div class="lc">
    <div class="lanc">⚓</div>
    <div class="lt">MARINHA DO BRASIL</div>
    <div style="font-family:var(--font-d);font-size:15px;font-weight:700;color:#ffffff;letter-spacing:4px;margin:10px 0 6px;">COMPAAZ</div>
    <div style="font-family:var(--font-b);font-size:11px;color:rgba(200,168,75,.85);letter-spacing:1.5px;font-style:italic;margin-bottom:4px;">"MONITORANDO ÁGUAS, RESGUARDANDO VIDAS"</div>
    <input class="li" type="text" id="lu" placeholder="Usuário" autocomplete="off">
    <input class="li" type="password" id="lp" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lb" onclick="doLogin()">ACESSAR SISTEMA</button>
    <div class="le" id="le"></div>
    <div class="lh">⚠ Sistema de uso interno restrito · COMPAAz 2026</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <button id="tgb" onclick="toggleSB()">☰</button>
  <div id="sb">
    <div style="text-align:center;margin-bottom:10px;padding:8px 6px 8px;">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,rgba(29,78,216,.3),rgba(37,99,235,.15));border:1px solid rgba(59,130,246,.22);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:21px;box-shadow:0 0 18px rgba(37,99,235,.15);">⚓</div>
      <div class="sb-brand">MARINHA DO BRASIL</div>
      <div class="sb-sub">COMPAAz · Adm.</div>
    </div>
    <nav id="nav" style="flex:1;"></nav>
    <div class="sb-foot">
      <div id="su" style="color:#2d4a72;margin-bottom:3px;"></div>
      Auto-save ativo ✓
    </div>
  </div>
  <div id="mn">
    <div id="tb">
      <h1 id="tt">Dashboard</h1>
      <div class="gs-w">
        <span class="gsi">🔍</span>
        <input class="gs" id="gsi" placeholder="Busca global…" autocomplete="off" oninput="doGS(this.value)" onblur="setTimeout(closeGS,200)">
        <div class="gsr" id="gsr"></div>
      </div>
      <div class="tb-r">
        <button class="svb" id="svb" onclick="manualSave()">💾 Salvar</button>
        <button class="btn btnG" onclick="exportarAba()" style="font-size:11px;padding:5px 10px;" title="Exportar aba atual">📤 Exportar</button>
        <button class="lob" onclick="doLogout()">🔒</button>
      </div>
    </div>
    <div id="ct"></div>
  </div>
</div>
<div id="toast"></div>


<script>
// ═══════════════════════════════════════
// BG PARTICLES
// ═══════════════════════════════════════
(function(){
  var c=document.getElementById('bg'),ctx=c.getContext('2d'),pts=[],W,H;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  resize();addEventListener('resize',resize);
  for(var i=0;i<50;i++)pts.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.4+.3,vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.15,a:Math.random()});
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(96,165,250,'+(0.3+p.a*0.3)+')';ctx.fill();});
    for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<100){ctx.beginPath();ctx.strokeStyle='rgba(59,130,246,'+(0.07*(1-d/100))+')';ctx.lineWidth=.6;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}}
    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
var USERS=[
  {user:'sgtgeral',pass:'M@rinha2026',role:'Sargenteante Geral',canEdit:true},
  {user:'auxgeral',pass:'M@rinha2026',role:'Auxiliar do Sargenteante',canEdit:false},
  {user:'supadm',  pass:'M@rinha2026',role:'Supervisor',canEdit:false},
  {user:'fielpg',  pass:'M@rinha2026',role:'Fiel de Pagamento',canEdit:false},
  {user:'encadm',  pass:'M@rinha2026',role:'Encarregado da Adm',canEdit:false},
  {user:'admin',   pass:'M@rinha2026',role:'ADMIN',canEdit:true},
];
var SK='cz_s3';
var _at='dashboard';
var _at='dashboard';
var _canEdit=false;

// ESTADO — inicializado antes de qualquer função de render
var S={
  roles:{
    sargenteante:{title:'Sargenteante Geral',name:'',color:'#1e3a5f',notes:''},
    auxiliar:{title:'Auxiliar do Sargenteante',name:'',color:'#1d4ed8',notes:''},
    supervisor:{title:'Supervisor',name:'',color:'#0284c7',notes:''},
    fiel:{title:'Fiel de Pagamento',name:'',color:'#2563eb',notes:''},
    encAdm:{title:'Encarregado da Adm',name:'',color:'#4f46e5',notes:''},
  },
  tasks:[
    {id:1,role:'sargenteante',task:'Presidir formatura diária',status:'pendente'},
    {id:2,role:'sargenteante',task:'Revisar escala de serviço',status:'pendente'},
    {id:3,role:'fiel',task:'Processar folha de pagamento',status:'pendente'},
    {id:4,role:'supervisor',task:'Supervisionar manutenção predial',status:'pendente'},
  ],
  pautas:[],atas:[],comms:[],
  agendaStatus:{},agendaMes:'MAI',
  nupData:[],osData:[],
  zhOver:{},eventos:[],atividades:[],
  afastamentos:[],tabLabels:{},notas:'',
  relDate:new Date().toISOString().split('T')[0],
  fielTab:'nup',anivMes:new Date().getMonth()+1,
  pbSearch:'',pbFSt:'todos',pbFPosto:'todos',sgtTab:'pautas',cemFil:'todos',cemSearch:'',
  zhS:'',zhFP:'all',zhFE:'all',zhFS:'all',zhFSt:'all',zhSort:'ant',zhShowAfast:true,
  nupSearch:'',nupFil:'todos',osSearch:'',osFil:'todos',
  fichaSearch:'',fichaPostoFil:'all',fichaExp:null,
};

function doLogin(){
  var u=document.getElementById('lu').value.trim().toLowerCase();
  var p=document.getElementById('lp').value;
  var f=USERS.find(function(x){return x.user===u&&x.pass===p;});
  if(!f){
    var e=document.getElementById('le');
    e.textContent='Usuário ou senha incorretos.';
    setTimeout(function(){e.textContent='';},3000);
    return;
  }
  startApp(f);
}
function doLogout(){
  if(!confirm('Sair do sistema?'))return;
  location.reload();
}
function startApp(f){
  _canEdit=!!f.canEdit;
  var ls=document.getElementById('ls');
  var app=document.getElementById('app');
  var su=document.getElementById('su');
  if(ls)ls.style.display='none';
  if(app)app.classList.remove('hidden');
  if(su)su.textContent='👤 '+f.role+(_canEdit?' ✏️':'');
  setTimeout(function(){
    try{

var GSI=[];
function buildGSI(){
  GSI=[];
  ZH_DATA.forEach(function(m){GSI.push({t:'Militar',l:m.nome,s:m.posto+' · '+m.setor,fn:function(){nav('zeroHora');}});});
  (S.nupData||[]).forEach(function(n){GSI.push({t:'NUP',l:n.nup,s:n.assunto,fn:function(){nav('fiel');}});});
  Object.keys(AGENDA_2026).forEach(function(mes){(AGENDA_2026[mes]||[]).forEach(function(it){GSI.push({t:mes,l:it.assunto,s:it.setor,fn:function(m){return function(){S.agendaMes=m;nav('agenda');};}(mes)});});});
  getTabs().forEach(function(t){GSI.push({t:'Módulo',l:t.label,s:'',fn:function(k){return function(){nav(k);};}(t.key)});});
}
function doGS(v){
  var r=document.getElementById('gsr');
  if(!v||v.length<2){r.classList.remove('op');return;}
  v=v.toLowerCase();
  var hits=GSI.filter(function(x){return(x.l||'').toLowerCase().indexOf(v)>=0||(x.s||'').toLowerCase().indexOf(v)>=0;}).slice(0,8);
  if(!hits.length){r.innerHTML='<div class="gri"><span style="color:#2d4a72;font-size:12px;">Nenhum resultado</span></div>';r.classList.add('op');return;}
  r.innerHTML=hits.map(function(h,i){return'<div class="gri" onclick="gsClick('+i+')"><span class="grt">'+esc(h.t)+'</span><span style="font-size:13px;color:#bfdbfe;font-weight:500;">'+esc(h.l)+'</span>'+(h.s?'<div style="font-size:11px;color:#4b6a9b;margin-top:1px;">'+esc(h.s)+'</div>':'')+'</div>';}).join('');
  r.classList.add('op');window._gsh=hits;
}
function gsClick(i){var h=(window._gsh||[])[i];if(h&&h.fn){document.getElementById('gsi').value='';closeGS();h.fn();}}

function buildNav(){
  var nav=document.getElementById('nav');if(!nav)return;
  var tabs=getTabs();var grps=[];var seen={};
  tabs.forEach(function(t){if(!seen[t.g]){seen[t.g]=true;grps.push(t.g);}});
  nav.innerHTML=grps.map(function(g){
    return'<div class="tgl">'+esc(g)+'</div>'+
    tabs.filter(function(t){return t.g===g;}).map(function(t){
      var oc='onclick="nav('+String.fromCharCode(39)+t.k+String.fromCharCode(39)+')"';
      return'<button class="tb'+(_at===t.k?' act':'')+'" '+oc+'><span>'+t.i+'</span><span>'+esc(t.label)+'</span></button>';
    }).join('');

  _at=k||'dashboard';
  buildNav();
  var t=getTabs().find(function(x){return x.k===_at;});

function render(){
  var c=document.getElementById('ct');
  if(!c)return;
  var map={dashboard:rDash,sgtgeral:rSgt,funcoes:rFuncoes,tarefas:rTarefas,eventos:rEventos,fiel:rFiel,agenda:rAgenda,zeroHora:rZH,lotacao:rLotacao,relatorio:rRel,aniversario:rAniversario,notas:rNotas,planoBusca:rPlanoBusca,agendaCEM:rAgendaCEM};
  var fn=map[_at];
  if(!fn){c.innerHTML='<div style="color:#f87171;padding:20px;">Módulo não encontrado: '+_at+'</div>';return;}
  try{
    var html=fn();
    c.innerHTML=html||'';
  }catch(e){
    c.innerHTML='<div style="color:#f87171;padding:20px;font-family:monospace;white-space:pre-wrap;font-size:12px;">ERRO em '+_at+':\n'+e.message+'\n\n'+e.stack+'</div>';
    return;
  }
  c.classList.add('fi');
  setTimeout(function(){c.classList.remove('fi');},350);
  if(_at==='dashboard'){setTimeout(drawCharts,80);setTimeout(renderInspAlerta,50);}
  if(_at==='zeroHora')setTimeout(drawZHCharts,80);
  if(_at==='lotacao')setTimeout(drawLotCharts,80);
}

function drawDonut(id,labels,data,colors){
  var cv=document.getElementById(id);if(!cv)return;
  var p=cv.parentElement;cv.width=p.offsetWidth||200;cv.height=160;
  var ctx=cv.getContext('2d'),cx=cv.width/2,cy=72,r=54,ir=34;
  var tot=data.reduce(function(a,b){return a+b;},0)||1,st=-Math.PI/2;
  data.forEach(function(d,i){var sl=2*Math.PI*(d/tot);ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,st,st+sl);ctx.closePath();ctx.fillStyle=colors[i];ctx.fill();ctx.beginPath();ctx.arc(cx,cy,ir,0,2*Math.PI);ctx.fillStyle='rgba(8,20,44,.9)';ctx.fill();st+=sl;});
  ctx.fillStyle='#bfdbfe';ctx.font='bold 16px Cinzel,serif';ctx.textAlign='center';ctx.fillText(tot,cx,cy+6);
  ctx.fillStyle='#4b6a9b';ctx.font='9px Barlow,sans-serif';ctx.fillText('total',cx,cy+19);
  var lx=4,ly=152;
  labels.forEach(function(l,i){if(data[i]===0)return;ctx.fillStyle=colors[i];ctx.fillRect(lx,ly-8,8,8);ctx.fillStyle='#4b6a9b';ctx.font='9px Barlow,sans-serif';ctx.textAlign='left';ctx.fillText(l.substring(0,8)+' ('+data[i]+')',lx+11,ly);lx+=cv.width/labels.length;});
}
function drawBars(id,labels,d1,d2,c1,c2){
  var cv=document.getElementById(id);if(!cv)return;
  var p=cv.parentElement;cv.width=p.offsetWidth||200;cv.height=160;
  var ctx=cv.getContext('2d'),W=cv.width,H=160,mx=Math.max.apply(null,d1)||1;
  var bw=Math.min(24,(W-30)/(labels.length*2+1)),gap=bw,x0=20;
  ctx.fillStyle=c1;ctx.fillRect(6,6,8,8);ctx.fillStyle='#4b6a9b';ctx.font='9px Barlow,sans-serif';ctx.textAlign='left';ctx.fillText('Total',17,14);
  ctx.fillStyle=c2;ctx.fillRect(60,6,8,8);ctx.fillStyle='#4b6a9b';ctx.fillText('Conc.',71,14);
  labels.forEach(function(l,i){var x=x0+i*(bw*2+gap);var h1=Math.round((d1[i]/mx)*(H-45));var h2=Math.round((d2[i]/mx)*(H-45));
    ctx.fillStyle=c1+'44';ctx.fillRect(x,H-25-h1,bw,h1);ctx.fillStyle=c1;ctx.fillRect(x,H-25-h1,bw,2);
    ctx.fillStyle=c2+'44';ctx.fillRect(x+bw+1,H-25-h2,bw,h2);ctx.fillStyle=c2;ctx.fillRect(x+bw+1,H-25-h2,bw,2);
    ctx.fillStyle='#2d4a72';ctx.font='8px Barlow,sans-serif';ctx.textAlign='center';ctx.fillText(l.substring(0,6),x+bw,H-12);
  });
}

function drawZHCharts(){
  var pres=ZH_DATA.filter(function(m){return(m.status||'presente')==='presente';}).length;
  var fer=ZH_DATA.filter(function(m){return m.status==='ferias';}).length;
  var mis=ZH_DATA.filter(function(m){return m.status==='missao';}).length;
  var afa=ZH_DATA.filter(function(m){return m.status==='afastado';}).length;
  drawDonut('zh-ch1',['Presentes','Férias','Missão','Afastado'],[pres,fer,mis,afa],['#34d399','#a78bfa','#fbbf24','#f87171']);
  var ofT=ZH_DATA.filter(function(m){return OFICIAIS.indexOf(m.posto)>=0;}).length;
  var prT=ZH_DATA.filter(function(m){return OFICIAIS.indexOf(m.posto)<0;}).length;
  drawDonut('zh-ch2',['Oficiais','Praças'],[ofT,prT],['#c4b5fd','#60a5fa']);
  // esp chart
  var espC={};ZH_DATA.filter(function(m){return OFICIAIS.indexOf(m.posto)<0&&m.esp;}).forEach(function(m){espC[m.esp]=(espC[m.esp]||0)+1;});
  var espKeys=Object.keys(espC).sort(function(a,b){return espC[b]-espC[a];}).slice(0,6);
  var cv=document.getElementById('zh-ch3');if(!cv)return;
  var p=cv.parentElement;cv.width=p.offsetWidth||200;cv.height=150;
  var ctx=cv.getContext('2d'),W=cv.width,H=150,mx=Math.max.apply(null,espKeys.map(function(k){return espC[k];}))||1;
  var bw=Math.max(12,Math.min(30,(W-30)/(espKeys.length+1)));
  var colors=['#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#93c5fd'];
  espKeys.forEach(function(k,i){var x=20+i*(bw+8);var h=Math.round((espC[k]/mx)*(H-40));ctx.fillStyle=colors[i%colors.length]+'55';ctx.fillRect(x,H-25-h,bw,h);ctx.fillStyle=colors[i%colors.length];ctx.fillRect(x,H-25-h,bw,2);ctx.fillStyle='#2d4a72';ctx.font='9px Barlow,sans-serif';ctx.textAlign='center';ctx.fillText(k.substring(0,4),x+bw/2,H-10);ctx.fillStyle=colors[i%colors.length];ctx.font='bold 10px Barlow,sans-serif';ctx.fillText(espC[k],x+bw/2,H-28-h);});
}

function getAnivSemana(){
  var hoje=new Date();
  var result=[];
  for(var i=0;i<7;i++){
    var d=new Date(hoje);d.setDate(hoje.getDate()+i);
    var dm=d.getDate(),mm=d.getMonth()+1;
    ANIVERSARIANTES.filter(function(a){return a.dia===dm&&a.mes===mm;}).forEach(function(a){
      result.push(Object.assign({},a,{_date:d,_hoje:i===0}));
    });
  }
  return result;
}
function getAnivMes(m){return ANIVERSARIANTES.filter(function(a){return a.mes===m;}).sort(function(a,b){return a.dia-b.dia;});}

// ── Aba Aniversariantes ──
function rAniversario(){
  var hoje=new Date();var mesAtual=hoje.getMonth()+1;
  var semana=getAnivSemana();
  var mesSel=S.anivMes||mesAtual;
  var doMes=getAnivMes(mesSel);
  var mBtns=MESES.map(function(m,i){var mn=i+1;var cnt=ANIVERSARIANTES.filter(function(a){return a.mes===mn;}).length;
    return'<button class="btn '+(mesSel===mn?'btnP':'btnG')+'" onclick="S.anivMes='+mn+';render()" style="font-size:10px;padding:4px 8px;">'+m+(mn===mesAtual?'★':'')+' ('+cnt+')</button>';
  }).join('');

  function anivCard(a,showDate){
    var isHoje=a._hoje;
    var cor=OFICIAIS.indexOf(a.posto)>=0?'#c4b5fd':'#60a5fa';
    return'<div class="icard" style="margin-bottom:7px;border-left:3px solid '+(isHoje?'#fbbf24':cor)+';'+(isHoje?'background:rgba(251,191,36,.07);':'')+'">' +
      '<div class="row" style="justify-content:space-between;">' +
        '<div class="row" style="gap:10px;">' +
          '<div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,'+cor+','+cor+'44);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">'+(isHoje?'🎂':'🎁')+'</div>' +
          '<div>' +
            '<div style="color:#bfdbfe;font-weight:700;font-size:13px;">'+esc(a.nome)+(isHoje?' <span style="color:#fbbf24;font-size:11px;">← HOJE! 🎉</span>':'')+'</div>' +
            '<div class="row" style="gap:6px;margin-top:2px;">'+pBadge(a.posto)+'<span style="font-size:11px;color:#4b6a9b;">'+esc(a.cqea||'')+'</span></div>' +
          '</div>' +
        '</div>' +
        (showDate?'<div style="text-align:center;min-width:44px;"><div style="font-size:20px;font-weight:700;color:'+cor+';">'+a.dia+'</div><div style="font-size:10px;color:#4b6a9b;">'+MESES[a.mes-1]+'</div></div>':
          '<div style="font-size:24px;font-weight:700;color:'+cor+';min-width:30px;text-align:center;">'+a.dia+'</div>')+
      '</div>' +
    '</div>';
  }

  return'<div class="sg">'+
    '<div><div style="color:#93c5fd;font-family:var(--font-d);font-size:15px;font-weight:600;">🎂 Aniversariantes 2026</div>'+
      '<div style="color:#2d4a72;font-size:12px;">'+ANIVERSARIANTES.length+' militares · Dados do DPM – SISPES</div></div>'+

    // KPIs
    '<div class="g4">'+
      [['Total',ANIVERSARIANTES.length,'#60a5fa'],
       ['Este Mês',ANIVERSARIANTES.filter(function(a){return a.mes===mesAtual;}).length,'#34d399'],
       ['Esta Semana',semana.length,'#fbbf24'],
       ['Hoje',semana.filter(function(a){return a._hoje;}).length,'#f87171']]
      .map(function(k){return'<div class="kc" style="padding:14px;border-left:3px solid '+k[2]+';"><div class="kl">'+k[0]+'</div><div class="kv" style="color:'+k[2]+';font-size:22px;">'+k[1]+'</div></div>';}).join('')+
    '</div>'+

    // Semana
    '<div class="card" style="border-left:4px solid #fbbf24;">'+
      '<div class="sT" style="color:#fbbf24;">🎉 Próximos 7 dias</div>'+
      (semana.length===0?
        '<div style="text-align:center;color:#1e3a5f;padding:16px;">Nenhum aniversariante nos próximos 7 dias</div>':
        semana.map(function(a){return anivCard(a,true);}).join(''))+
    '</div>'+

    // Por mês
    '<div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;">'+mBtns+'</div>'+
    '<div class="card">'+
      '<div class="sT">'+MESES[mesSel-1]+' — '+doMes.length+' aniversariante'+(doMes.length!==1?'s':'')+'</div>'+
      (doMes.length===0?'<div style="text-align:center;color:#1e3a5f;padding:16px;">Nenhum este mês</div>':
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+doMes.map(function(a){return anivCard(a,false);}).join('')+'</div>')+
    '</div></div>'+
  '</div>';
}

function rRel(){
  var dt=S.relDate||new Date().toISOString().split('T')[0];
  var ativs=(S.atividades||[]).filter(function(a){return a.data===dt;});
  var ini=ativs.filter(function(a){return a.status==='iniciada';});
  var and=ativs.filter(function(a){return a.status==='andamento';});
  var con=ativs.filter(function(a){return a.status==='concluida';});
  var fmtD=new Date(dt+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});

  function col(items,title,c,empty){return'<div><div style="color:'+c+';font-size:11px;font-weight:700;margin-bottom:8px;text-transform:uppercase;">'+title+' ('+items.length+')</div>'+(items.length===0?'<div class="icard" style="text-align:center;padding:14px;color:#1e3a5f;font-size:12px;">'+empty+'</div>':items.map(atvCard).join(''))+'</div>';}

      '<button class="btn btnP" onclick="openAddAtv()">+ Atividade</button>'+
    '</div>'+
    '<div class="card" style="padding:11px;">'+
      '<div class="row" style="justify-content:space-between;align-items:center;">'+
        '<button class="btn btnG" onclick="setRelDate(\''+prev.toISOString().split('T')[0]+'\')" style="font-size:17px;">◀</button>'+
        '<div style="text-align:center;"><div style="color:#bfdbfe;font-weight:600;font-size:14px;">'+fmtD+'</div><input type="date" class="inpSm" value="'+esc(dt)+'" onchange="setRelDate(this.value)" style="margin-top:5px;"></div>'+
        '<button class="btn btnG" onclick="setRelDate(\''+next.toISOString().split('T')[0]+'\')" style="font-size:17px;">▶</button>'+
      '</div>'+
    '</div>'+
    '<div class="g4">'+[['Total',ativs.length,'#60a5fa'],['Iniciadas',ini.length,'#93c5fd'],['Andamento',and.length,'#fbbf24'],['Concluídas',con.length,'#34d399']].map(function(k){return'<div class="icard" style="text-align:center;padding:12px;border-left:3px solid '+k[2]+';"><div style="font-size:9px;color:#4b6a9b;text-transform:uppercase;margin-bottom:4px;">'+k[0]+'</div><div style="font-size:22px;font-weight:700;color:'+k[2]+';">'+k[1]+'</div></div>';}).join('')+'</div>'+
    '<div id="add-atv-form" style="display:none;" class="card">'+
      '<div style="color:#93c5fd;font-family:var(--font-d);font-size:14px;margin-bottom:14px;">+ Nova Atividade</div>'+

function getPBData(){
  if(!S.pbStatus)S.pbStatus={};
  if(!S.pbObs)S.pbObs={};
  return PLANO_BUSCA_DATA.map(function(m){
    return Object.assign({},m,{
      status:S.pbStatus[m.nip]||'pendente',
      obs:S.pbObs[m.nip]||''
    });
  });
}
function setPBStatus(nip,st){
  if(!canEdit())return;
  if(!S.pbStatus)S.pbStatus={};
  S.pbStatus[nip]=st;
  saveS();
  // Only re-render the tbody and KPIs, not the whole page
  renderPBTable();
  updatePBKpis();
  showToast('✓ Status atualizado: '+st);
}
function savePBObs(nip){
  if(!canEdit())return;
  var el=document.getElementById('pbobs-'+nip);
  if(!el)return;
  if(!S.pbObs)S.pbObs={};
  S.pbObs[nip]=el.value;
  saveS();
  showToast('✓ Observação salva!');
}
function pbFilteredData(){
  var data=getPBData();
  var srch=(S.pbSearch||'').toLowerCase();
  var fSt=S.pbFSt||'todos';
  var fPosto=S.pbFPosto||'todos';
  return data.filter(function(m){
    var matchSt=fSt==='todos'||m.status===fSt;
    var matchP=fPosto==='todos'||m.posto===fPosto;
    var matchS=!srch||(m.nome.toLowerCase().indexOf(srch)>=0||m.guerra.toLowerCase().indexOf(srch)>=0||m.nip.indexOf(srch)>=0||m.cel.indexOf(srch)>=0);
    return matchSt&&matchP&&matchS;
  });
}

        (m.tel&&m.cel?'<br>':'')+(m.tel?'<span style="color:#60a5fa;font-size:10px;">☎ '+esc(m.tel)+'</span>':'')+
        (!hasContact?'<span style="color:#4b6a9b;font-size:10px;">—</span>':'')+
      '</td>'+
      '<td style="font-size:10px;color:#93c5fd;max-width:160px;word-break:break-all;">'+
        (m.email?'<a href="mailto:'+esc(m.email)+'" style="color:#93c5fd;text-decoration:none;">✉ '+esc(m.email)+'</a>':'<span style="color:#2d4a72;">—</span>')+
      '</td>'+

      '</td>'+

        (canEdit()?
          '<div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap;">'+
          '<button class="btn btnS" style="font-size:9px;padding:3px 5px;" onclick="setPBStatus(\''+m.nip+'\',\'contactado\')">✔</button>'+

      '</td>'+

        (canEdit()?

function renderPBTable(){
  var filtered=pbFilteredData();
  var tbody=document.getElementById('pb-tbody');
  var empty=document.getElementById('pb-empty');
  var count=document.getElementById('pb-count');
  if(tbody)tbody.innerHTML=pbBuildRows(filtered);
  if(empty)empty.style.display=filtered.length===0?'block':'none';
  if(count)count.textContent=filtered.length+' registros';
}
function updatePBKpis(){
  var data=getPBData();
  var total=data.length;
  var cont=data.filter(function(m){return m.status==='contactado';}).length;
  var nao=data.filter(function(m){return m.status==='nao_contactado';}).length;
  var pend=data.filter(function(m){return m.status==='pendente';}).length;
  var pct=total?Math.round(cont/total*100):0;
  var el;
  if((el=document.getElementById('pb-kpi-cont')))el.textContent=cont;
  if((el=document.getElementById('pb-kpi-pct')))el.textContent=pct+'%';
  if((el=document.getElementById('pb-kpi-nao')))el.textContent=nao;
  if((el=document.getElementById('pb-kpi-pend')))el.textContent=pend;
  if((el=document.getElementById('pb-kpi-bar')))el.style.width=pct+'%';
  if((el=document.getElementById('pb-kpi-pct2')))el.textContent=pct+'% concluído';
}

function lotStatusBadge(lot,efe){
  if(lot===0&&efe>0)return'<span style="background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700;">SEM LOT.</span>';
  var pct=lot?Math.round(efe/lot*100):0;
  if(pct>=90&&pct<=110)return'<span style="background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700;">'+pct+'%</span>';
  if(pct>110)return'<span style="background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700;">'+pct+'%</span>';

}

function lotBar(lot,efe,maxVal){

function drawLotCharts(){
  // Chart 1: Oficiais por qualificação
  var c1=document.getElementById('lot-chart-of');
  if(c1){
    var ctx=c1.getContext('2d');
    var labels=LOT_OF.map(function(o){return o.qualif;});
    var lots=LOT_OF.map(function(o){return o.lot;});
    var efes=LOT_OF.map(function(o){return o.efe;});
    var W=c1.width=c1.parentElement.offsetWidth||400,H=c1.height=220;
    ctx.clearRect(0,0,W,H);
    var n=labels.length,barW=Math.floor((W-60)/(n*2+1)),gap=barW,padL=50,padB=40,padT=20;
    var maxV=Math.max.apply(null,lots.concat(efes))+2;
    // Grid lines
    for(var g=0;g<=4;g++){
      var yg=padT+((H-padT-padB)/4)*(4-g);
      var vg=Math.round(maxV/4*g);
      ctx.beginPath();ctx.strokeStyle='rgba(59,130,246,.08)';ctx.lineWidth=1;
      ctx.moveTo(padL,yg);ctx.lineTo(W-10,yg);ctx.stroke();
      ctx.fillStyle='rgba(148,163,184,.4)';ctx.font='9px Inter,sans-serif';ctx.textAlign='right';
      ctx.fillText(vg,padL-4,yg+3);
    }
    labels.forEach(function(lbl,i){
      var x=padL+i*(barW*2+gap)+gap/2;
      var hL=lot?((lots[i]/maxV)*(H-padT-padB)):0;
      var hE=((efes[i]/maxV)*(H-padT-padB));
      var yL=H-padB-hL, yE=H-padB-hE;
      // Lotação bar
      ctx.fillStyle='rgba(59,130,246,.4)';
      ctx.beginPath();ctx.roundRect(x,yL,barW,hL,3);ctx.fill();
      // Efetivo bar
      var pct=lots[i]?efes[i]/lots[i]:0;
      var clr=pct>=.9&&pct<=1.1?'rgba(52,211,153,.75)':pct>1.1?'rgba(248,113,113,.75)':'rgba(251,191,36,.75)';
      ctx.fillStyle=clr;
      ctx.beginPath();ctx.roundRect(x+barW,yE,barW,hE,3);ctx.fill();
      // Label
      ctx.fillStyle='rgba(148,163,184,.7)';ctx.font='9px Inter,sans-serif';ctx.textAlign='center';
      ctx.fillText(lbl,x+barW,H-padB+12);
    });
    // Legend
    ctx.fillStyle='rgba(59,130,246,.6)';ctx.fillRect(padL,8,10,8);
    ctx.fillStyle='rgba(148,163,184,.8)';ctx.font='10px Inter,sans-serif';ctx.textAlign='left';
    ctx.fillText('Lotação',padL+14,16);
    ctx.fillStyle='rgba(52,211,153,.7)';ctx.fillRect(padL+80,8,10,8);
    ctx.fillText('Efetivo',padL+94,16);
  }

  // Chart 2: Praças por graduação (grouped bar)
  var c2=document.getElementById('lot-chart-pr-grad');
  if(c2){
    var ctx2=c2.getContext('2d');
    var grads=['SO','1SG','2SG','3SG','CB','MN/SD'];
    var lots2=grads.map(function(g){return LOT_PR_GRAD[g]?LOT_PR_GRAD[g].lot:0;});
    var efes2=grads.map(function(g){return LOT_PR_GRAD[g]?LOT_PR_GRAD[g].efe:0;});
    var W2=c2.width=c2.parentElement.offsetWidth||400,H2=c2.height=220;
    ctx2.clearRect(0,0,W2,H2);
    var n2=grads.length,bW=Math.floor((W2-60)/(n2*2+1)),g2=bW,pL=50,pB=40,pT=20;
    var mV=Math.max.apply(null,lots2.concat(efes2))+3;
    for(var gg=0;gg<=4;gg++){
      var ygg=pT+((H2-pT-pB)/4)*(4-gg);
      ctx2.beginPath();ctx2.strokeStyle='rgba(59,130,246,.08)';ctx2.lineWidth=1;
      ctx2.moveTo(pL,ygg);ctx2.lineTo(W2-10,ygg);ctx2.stroke();
      ctx2.fillStyle='rgba(148,163,184,.4)';ctx2.font='9px Inter,sans-serif';ctx2.textAlign='right';
      ctx2.fillText(Math.round(mV/4*gg),pL-4,ygg+3);
    }
    grads.forEach(function(gr,i){
      var x2=pL+i*(bW*2+g2)+g2/2;
      var hL2=((lots2[i]/mV)*(H2-pT-pB)),hE2=((efes2[i]/mV)*(H2-pT-pB));
      var yL2=H2-pB-hL2,yE2=H2-pB-hE2;
      ctx2.fillStyle='rgba(59,130,246,.4)';
      ctx2.beginPath();ctx2.roundRect(x2,yL2,bW,hL2,3);ctx2.fill();
      var p2=lots2[i]?efes2[i]/lots2[i]:0;
      var cl2=p2>=.9&&p2<=1.1?'rgba(52,211,153,.75)':p2>1.1?'rgba(248,113,113,.75)':'rgba(251,191,36,.75)';
      ctx2.fillStyle=cl2;
      ctx2.beginPath();ctx2.roundRect(x2+bW,yE2,bW,hE2,3);ctx2.fill();
      ctx2.fillStyle='rgba(148,163,184,.7)';ctx2.font='10px Inter,sans-serif';ctx2.textAlign='center';
      ctx2.fillText(gr,x2+bW,H2-pB+14);
    });
    ctx2.fillStyle='rgba(59,130,246,.6)';ctx2.fillRect(pL,8,10,8);
    ctx2.fillStyle='rgba(148,163,184,.8)';ctx2.font='10px Inter,sans-serif';ctx2.textAlign='left';
    ctx2.fillText('Lotação',pL+14,16);
    ctx2.fillStyle='rgba(52,211,153,.7)';ctx2.fillRect(pL+80,8,10,8);
    ctx2.fillText('Efetivo',pL+94,16);
  }

  // Chart 3: Praças por especialidade (horizontal bar)
  var c3=document.getElementById('lot-chart-pr-esp');
  if(c3){
    var ctx3=c3.getContext('2d');
    var sorted=LOT_PR.slice().sort(function(a,b){return(b.lot+b.efe)-(a.lot+a.efe);}).slice(0,15);
    var W3=c3.width=c3.parentElement.offsetWidth||400;
    var rowH=22,padL3=42,padR=50,padT3=10;
    var H3=c3.height=sorted.length*rowH+padT3+10;
    ctx3.clearRect(0,0,W3,H3);
    var maxV3=Math.max.apply(null,sorted.map(function(x){return Math.max(x.lot,x.efe);}));
    sorted.forEach(function(d,i){
      var y3=padT3+i*rowH;
      var availW=W3-padL3-padR;
      var wL=maxV3?Math.round(d.lot/maxV3*availW):0;
      var wE=maxV3?Math.round(d.efe/maxV3*availW):0;
      var p3=d.lot?d.efe/d.lot:0;
      var cl3=p3>=.9&&p3<=1.1?'rgba(52,211,153,.65)':p3>1.1?'rgba(248,113,113,.65)':'rgba(251,191,36,.65)';
      // bg
      ctx3.fillStyle='rgba(8,20,44,.4)';
      ctx3.beginPath();ctx3.roundRect(padL3,y3+2,availW,rowH-6,3);ctx3.fill();
      // lot bar
      if(wL>0){ctx3.fillStyle='rgba(59,130,246,.35)';ctx3.beginPath();ctx3.roundRect(padL3,y3+2,wL,rowH-6,3);ctx3.fill();}
      // efe bar (overlay, smaller)
      if(wE>0){ctx3.fillStyle=cl3;ctx3.beginPath();ctx3.roundRect(padL3,y3+2+(rowH-6)*0.35,wE,(rowH-6)*0.55,2);ctx3.fill();}
      // Label
      ctx3.fillStyle='rgba(148,163,184,.8)';ctx3.font='9px Inter,sans-serif';ctx3.textAlign='right';
      ctx3.fillText(d.esp,padL3-4,y3+rowH/2+3);
      // Values
      ctx3.fillStyle='rgba(96,165,250,.8)';ctx3.font='9px Inter,sans-serif';ctx3.textAlign='left';
      ctx3.fillText('L:'+d.lot+' E:'+d.efe,padL3+Math.max(wL,wE)+4,y3+rowH/2+3);
    });
  }
}

    '@media print{body{margin:10px;}button{display:none;}}'+

      '<div class="org">MARINHA DO BRASIL — COMPAAz · Div. Adm.</div>'+

function expRelODS(){
  var dt=S.relDate||new Date().toISOString().split('T')[0];
  var ativs=(S.atividades||[]).filter(function(a){return a.data===dt;});
  var fmtD=new Date(dt+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  var statusLabel={iniciada:'Iniciada',andamento:'Em Andamento',concluida:'Concluída'};

  // Build CSV (compatible with LibreOffice Calc / Excel)
  var lines=[
    'MARINHA DO BRASIL — COMPAAz',
    'RELATÓRIO DIÁRIO DE ATIVIDADES',
    fmtD,
    '',
    'Horário\tAtividade\tResponsável\tPosto\tStatus\tObservações'
  ];
  ativs.forEach(function(a){
    var hora=(a.hora_inicio||'')+(a.hora_fim?' → '+a.hora_fim:'');
    lines.push([
      hora,
      a.atividade||'',
      a.militar||'',
      a.posto||'',
      statusLabel[a.status]||a.status,
      a.obs||''
    ].join('\t'));
  });
  lines.push('');
  lines.push('Total\t'+ativs.length+'\t\t\t\t');
  lines.push('Emitido em\t'+new Date().toLocaleString('pt-BR'));

  var csv=lines.join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/tab-separated-values;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='relatorio_diario_'+dt+'.ods';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ Arquivo exportado!');
}

/* ── 11. ANIVERSARIANTES ──────────────────────────────────────────── */
function expAniversario(){
  var ef=S.efetivo||[];
  var mesAtual=(S.anivMes||new Date().getMonth()+1);
  var meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var aniv=ef.filter(function(m){
    if(!m.aniversario)return false;
    var p=m.aniversario.split('/');
    return p.length>=2&&parseInt(p[1])===mesAtual;
  }).sort(function(a,b){
    var da=parseInt((a.aniversario||'').split('/')[0]);
    var db=parseInt((b.aniversario||'').split('/')[0]);
    return da-db;
  });
  var rows=aniv.map(function(m,i){
    return'<tr><td>'+(i+1)+'</td><td>'+esc(m.nome||'')+'</td><td>'+esc(m.posto||'')+'</td>'+
      '<td style="text-align:center">'+esc(m.aniversario||'')+'</td></tr>';

// ALERTA INSPEÇÃO DE SAÚDE NO DASHBOARD

function renderInspAlerta(){
  var el=document.getElementById('dash-insp-alert');

  var urgentes=INSPECAO_DATA.filter(function(m){
    if(!m.dt)return false;
    var dias=Math.round((new Date(m.dt)-hoje)/(1000*60*60*24));
    return dias<=60;
  }).map(function(m){
    var dias=Math.round((new Date(m.dt)-hoje)/(1000*60*60*24));
    return Object.assign({},m,{dias:dias});
  }).sort(function(a,b){return a.dias-b.dias;}).slice(0,8);

  if(urgentes.length===0){el.innerHTML='';return;}

  var venc=urgentes.filter(function(m){return m.dias<0;}).length;
  var hoje30=urgentes.filter(function(m){return m.dias>=0&&m.dias<=30;}).length;

  var cards=urgentes.map(function(m){
    var cor=m.dias<0?'#f87171':m.dias<=30?'#f87171':'#fbbf24';
    var bg=m.dias<0?'rgba(239,68,68,.15)':m.dias<=30?'rgba(239,68,68,.1)':'rgba(251,191,36,.1)';
    var label=m.dias<0?'VENCIDO '+Math.abs(m.dias)+'d':m.dias===0?'HOJE':m.dias+'d';
    return'<div style="background:'+bg+';border:1px solid '+cor+'33;border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center;gap:8px;">'+
      '<div>'+
        '<div style="font-size:11px;font-weight:700;color:#bfdbfe;">'+esc(m.guerra)+'</div>'+
        '<div style="font-size:10px;color:#4b6a9b;">'+esc(m.posto)+' · '+esc(m.nip)+'</div>'+
      '</div>'+
      '<div style="text-align:right;">'+
        '<div style="font-size:11px;font-weight:700;color:'+cor+';">'+label+'</div>'+
        '<div style="font-size:10px;color:#4b6a9b;">'+(m.dt?m.dt.split('-').reverse().join('/'):'—')+'</div>'+
      '</div>'+
    '</div>';
  }).join('');

  el.innerHTML='<div class="card" style="margin-bottom:10px;border-color:rgba(239,68,68,.3);background:rgba(12,20,44,.95);">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;">'+
      '<div style="display:flex;align-items:center;gap:8px;">'+
        '<span style="font-size:16px;">🏥</span>'+
        '<div>'+
          '<div style="font-family:var(--font-d);font-size:13px;color:#f87171;font-weight:700;">INSPEÇÕES DE SAÚDE — ATENÇÃO</div>'+
          '<div style="font-size:10px;color:#4b6a9b;">'+
            (venc>0?'<span style="color:#f87171;font-weight:700;">'+venc+' vencida(s)</span> · ':'')+''+hoje30+' vencendo em 30 dias'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<button class="btn btnG" style="font-size:10px;" onclick="S.sgtTab=\'inspecao\';nav(\'sgtgeral\')">Ver todas →</button>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;">'+
      cards+
    '</div>'+
  '</div>';
}

// EXPORTAÇÕES SUB-ABAS SARGENTEANTE
// ═══════════════════════════════════════
function expInspecao(){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var data=INSPECAO_DATA.map(function(m){
    var dias=m.dt?Math.round((new Date(m.dt)-hoje)/(1000*60*60*24)):null;
    return Object.assign({},m,{dias:dias});
  }).sort(function(a,b){
    if(a.dias===null)return 1;if(b.dias===null)return-1;
    return a.dias-b.dias;
  });

  var venc=data.filter(function(m){return m.dias!==null&&m.dias<0;}).length;
  var p30=data.filter(function(m){return m.dias!==null&&m.dias>=0&&m.dias<=30;}).length;
  var p90=data.filter(function(m){return m.dias!==null&&m.dias>30&&m.dias<=90;}).length;

  function badge(dias){
    if(dias===null)return'<span style="color:#64748b">Sem data</span>';
    if(dias<0)return'<span style="background:#fee2e2;color:#b91c1c;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;">VENCIDO '+Math.abs(dias)+'d</span>';
    if(dias===0)return'<span style="background:#fee2e2;color:#b91c1c;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;">HOJE</span>';
    if(dias<=30)return'<span style="background:#fee2e2;color:#b91c1c;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;">'+dias+'d</span>';
    if(dias<=90)return'<span style="background:#fef3c7;color:#92400e;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;">'+dias+'d</span>';
    return'<span style="background:#d1fae5;color:#065f46;padding:1px 7px;border-radius:20px;font-size:10px;">'+dias+'d</span>';
  }

  var rows=data.map(function(m,i){
    var bg=m.dias!==null&&m.dias<0?'#fff1f2':m.dias!==null&&m.dias<=30?'#fff8f8':m.dias!==null&&m.dias<=90?'#fffbeb':i%2===0?'#f8fafc':'#fff';
    return'<tr style="background:'+bg+';">'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;text-align:center;color:#64748b;font-size:11px;">'+(i+1)+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;font-size:10px;font-family:monospace;">'+esc(m.nip)+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;text-align:center;font-size:11px;">'+esc(m.posto)+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;font-size:10px;">'+esc(m.cqea)+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;font-weight:600;font-size:11px;">'+esc(m.guerra)+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;text-align:center;font-size:11px;">'+(m.dt?m.dt.split('-').reverse().join('/'):'—')+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;text-align:center;">'+badge(m.dias)+'</td>'+
    '</tr>';
  }).join('');

  var sumario='<div style="display:flex;gap:20px;margin-bottom:12px;padding:10px;background:#f8fafc;border-radius:6px;font-size:11px;flex-wrap:wrap;">'+
    '<span>Total: <strong>'+data.length+'</strong></span>'+
    '<span style="color:#b91c1c">Vencidas: <strong>'+venc+'</strong></span>'+
    '<span style="color:#b91c1c">Próx. 30 dias: <strong>'+p30+'</strong></span>'+
    '<span style="color:#92400e">Próx. 90 dias: <strong>'+p90+'</strong></span>'+
    '<span style="color:#065f46">OK: <strong>'+(data.length-venc-p30-p90)+'</strong></span>'+
  '</div>';

  var corpo=sumario+'<table style="width:100%;border-collapse:collapse;">'+
    '<thead><tr style="background:#1e3a8a;">'+
      '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;text-align:center;font-size:11px;">#</th>'+
      '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;font-size:11px;">NIP</th>'+
      '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;font-size:11px;">Posto</th>'+
      '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;font-size:11px;">CQEA</th>'+
      '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;font-size:11px;">Nome de Guerra</th>'+
      '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;text-align:center;font-size:11px;">Dt Inspeção</th>'+
      '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;text-align:center;font-size:11px;">Prazo</th>'+
    '</tr></thead>'+
    '<tbody>'+rows+'</tbody>'+
  '</table>';

  abrirJanelaPDF('INSPEÇÕES DE SAÚDE — COMPAAz', corpo);
}

/* ── TAREFA ─────────────────────────────────────────────────────────── */
function editTask(id){
  if(!canEdit())return;
  var t=S.tasks.find(function(x){return x.id===id;});
  if(!t)return;
  var novo=prompt('Editar tarefa:',t.task);

  if(novo.trim())t.task=novo.trim();

  showToast('✓ Tarefa atualizada!');
}

/* ══════════════════════════════════════════════════════════════════════
   MODAL DE EDIÇÃO UNIVERSAL
   ══════════════════════════════════════════════════════════════════════ */
function showEditModal(titulo, campos, onSave){
  // Remove existing modal
  var ex=document.getElementById('edit-modal-overlay');
  if(ex)ex.remove();

  var inputs=campos.map(function(f,i){
    var id='em-field-'+i;
    var inp='';
    if(f.type==='select'){
      inp='<select id="'+id+'" class="inp" style="width:100%;">'+
        f.opts.map(function(o){return'<option value="'+o+'"'+(o===f.val?' selected':'')+'>'+o+'</option>';}).join('')+
      '</select>';
    } else {
      inp='<input id="'+id+'" class="inp" style="width:100%;" value="'+esc(f.val||'')+'" placeholder="'+esc(f.label)+'">';
    }
    return'<div style="margin-bottom:10px;">'+
      '<label style="font-size:10px;color:#4b6a9b;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;">'+f.label+'</label>'+
      inp+
    '</div>';
  }).join('');

  var modal=document.createElement('div');
  modal.id='edit-modal-overlay';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
  modal.innerHTML=
    '<div style="background:linear-gradient(135deg,#0c1e3a,#08142c);border:1px solid rgba(59,130,246,.3);border-radius:14px;padding:24px;min-width:340px;max-width:520px;width:90%;box-shadow:0 25px 60px rgba(0,0,0,.6);">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">'+
        '<div style="font-family:var(--font-d);font-size:14px;color:#bfdbfe;font-weight:700;">✏ '+titulo+'</div>'+
        '<button onclick="document.getElementById(\'edit-modal-overlay\').remove()" style="background:none;border:none;color:#4b6a9b;font-size:18px;cursor:pointer;padding:2px 6px;">✕</button>'+
      '</div>'+
      inputs+
      '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">'+
        '<button id="em-cancel" class="btn btnG" style="font-size:12px;">Cancelar</button>'+
        '<button id="em-save" class="btn btnS" style="font-size:12px;">💾 Salvar</button>'+
      '</div>'+
    '</div>';

  document.body.appendChild(modal);

  document.getElementById('em-cancel').onclick=function(){modal.remove();};
  modal.onclick=function(ev){if(ev.target===modal)modal.remove();};
  document.getElementById('em-save').onclick=function(){
    var vals={};
    campos.forEach(function(f,i){
      vals[f.key]=document.getElementById('em-field-'+i).value;
    });
    onSave(vals);
    modal.remove();
  };
  // Focus first field
  setTimeout(function(){
    var first=document.getElementById('em-field-0');
    if(first)first.focus();
  },50);
}

// ═══════════════════════════════════════
// AGENDA CEM
// ═══════════════════════════════════════
function rAgendaCEM(){
  var items=S.cemItems||[];
  var srch=(S.cemSearch||'').toLowerCase();
  var fil=S.cemFil||'todos';
  var filtered=items.filter(function(it){
    var ms=fil==='todos'||(fil==='pendente'&&it.status!=='concluido')||(fil==='concluido'&&it.status==='concluido');
    var ss=!srch||(it.assunto||'').toLowerCase().indexOf(srch)>=0||(it.responsavel||'').toLowerCase().indexOf(srch)>=0||(it.obs||'').toLowerCase().indexOf(srch)>=0;
    return ms&&ss;
  });
  var tot=items.length;
  var conc=items.filter(function(i){return i.status==='concluido';}).length;
  var pend=tot-conc;
  var pct=tot?Math.round(conc/tot*100):0;

  var rows=filtered.length===0
    ?'<tr><td colspan="6" style="text-align:center;padding:20px;color:#4b6a9b;">Nenhum item encontrado</td></tr>'
    :filtered.map(function(it,i){
      var dn=it.status==='concluido';
      return'<tr style="opacity:'+(dn?.6:1)+';background:'+(dn?'rgba(16,185,129,.05)':'')+';">'+
        '<td style="text-align:center;font-size:10px;color:#4b6a9b;">'+(i+1)+'</td>'+
        '<td style="font-size:11px;color:#60a5fa;font-weight:600;">'+esc(it.responsavel||'—')+'</td>'+
        '<td style="color:'+(dn?'#4b6a9b':'#bfdbfe')+';font-size:11px;text-decoration:'+(dn?'line-through':'none')+';">'+esc(it.assunto||'')+'</td>'+
        '<td style="font-size:10px;color:#64748b;text-align:center;">'+esc(it.data_entrada||'—')+'</td>'+
        '<td style="font-size:10px;color:#fbbf24;text-align:center;">'+esc(it.prazo||'—')+'</td>'+
        '<td style="font-size:10px;color:#93c5fd;">'+esc(it.obs||'—')+'</td>'+
        '<td style="text-align:center;">'+
          '<span class="badge '+(dn?'b-green':'b-yellow')+'" style="cursor:pointer;" onclick="togCEM(\''+it.id+'\')">'+
            (dn?'Conc.':'Pend.')+
          '</span>'+
        '</td>'+
        '<td style="text-align:center;">'+
          (canEdit()?
            '<div style="display:flex;gap:3px;justify-content:center;">'+
              '<button class="btn btnG" onclick="editCEM(\''+it.id+'\')" style="font-size:9px;padding:2px 5px;">✏</button>'+
              '<button class="btn btnD" onclick="delCEM(\''+it.id+'\')" style="font-size:9px;padding:2px 5px;">🗑</button>'+
            '</div>':'')+'</td>'+
      '</tr>';
    }).join('');

  return'<div class="sg fi">'+
    '<div class="card" style="background:linear-gradient(135deg,rgba(12,30,58,.95),rgba(8,20,44,.98));border-color:rgba(59,130,246,.3);">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px;">'+
        '<div>'+
          '<div style="font-family:var(--font-d);font-size:15px;color:var(--text);letter-spacing:.5px;">📌 AGENDA CEM — COMPAAz</div>'+
          '<div style="font-size:11px;color:#4b6a9b;margin-top:2px;">Controle de atividades e compromissos do CEM</div>'+
        '</div>'+
        (canEdit()?'<button class="btn btnS" onclick="addCEM()" style="font-size:11px;">+ Novo Item</button>':'')+
      '</div>'+
      '<div class="g4">'+
        '<div class="icard" style="text-align:center;"><div style="font-size:22px;font-weight:700;font-family:var(--font-d);color:#60a5fa;">'+tot+'</div><div style="font-size:10px;color:#2d4a72;margin-top:3px;">Total</div></div>'+
        '<div class="icard" style="text-align:center;"><div style="font-size:22px;font-weight:700;font-family:var(--font-d);color:#fbbf24;">'+pend+'</div><div style="font-size:10px;color:#2d4a72;margin-top:3px;">Pendentes</div></div>'+
        '<div class="icard" style="text-align:center;"><div style="font-size:22px;font-weight:700;font-family:var(--font-d);color:#34d399;">'+conc+'</div><div style="font-size:10px;color:#2d4a72;margin-top:3px;">Concluídos</div></div>'+
        '<div class="icard" style="padding:10px;">'+
          '<div style="font-size:10px;color:#2d4a72;margin-bottom:5px;">Progresso</div>'+
          '<div class="progress" style="height:8px;margin-bottom:4px;"><div class="pFill" style="width:'+pct+'%;background:linear-gradient(90deg,#10b981,#34d399);"></div></div>'+
          '<div style="font-size:11px;color:#34d399;text-align:right;font-weight:700;">'+pct+'%</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="card">'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">'+
        '<input class="inpSm" id="cem-srch" style="flex:1;min-width:180px;" placeholder="🔍 Buscar assunto, responsável..." value="'+esc(S.cemSearch||'')+'" oninput="S.cemSearch=this.value;render()">'+
        '<select class="inpSm" onchange="S.cemFil=this.value;render()">'+
          '<option value="todos"'+(fil==='todos'?' selected':'')+'>Todos ('+tot+')</option>'+
          '<option value="pendente"'+(fil==='pendente'?' selected':'')+'>⏳ Pendentes ('+pend+')</option>'+
          '<option value="concluido"'+(fil==='concluido'?' selected':'')+'>✔ Concluídos ('+conc+')</option>'+
        '</select>'+
        '<span style="font-size:11px;color:#4b6a9b;">'+filtered.length+' itens</span>'+
      '</div>'+
    '</div>'+
    '<div class="card" style="padding:0;overflow:hidden;">'+
      '<div style="overflow-x:auto;">'+
        '<table style="min-width:900px;">'+
          '<thead><tr style="background:rgba(29,78,216,.15);">'+
            '<th style="width:36px;">#</th>'+
            '<th style="width:130px;">Responsável</th>'+
            '<th>Assunto</th>'+
            '<th style="width:100px;text-align:center;">Dt Entrada</th>'+
            '<th style="width:90px;text-align:center;">Prazo</th>'+
            '<th>Observações</th>'+
            '<th style="width:70px;text-align:center;">Status</th>'+
            '<th style="width:70px;"></th>'+
          '</tr></thead>'+
          '<tbody>'+rows+'</tbody>'+
        '</table>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function togCEM(id){
  var it=(S.cemItems||[]).find(function(x){return x.id===id;});
  if(!it)return;
  it.status=it.status==='concluido'?'pendente':'concluido';
  saveS();render();showToast('✓ Status atualizado!');
}
function addCEM(){
  if(!canEdit())return;
  showEditModal('Novo Item — Agenda CEM',[
    {label:'Responsável',key:'responsavel',val:''},
    {label:'Assunto',key:'assunto',val:''},
    {label:'Data de Entrada',key:'data_entrada',val:''},
    {label:'Prazo',key:'prazo',val:''},
    {label:'Observações / Referências',key:'obs',val:''},
  ],function(vals){
    if(!vals.assunto.trim()){showToast('⚠ Assunto é obrigatório!');return;}
    if(!S.cemItems)S.cemItems=[];
    S.cemItems.push(Object.assign({id:Date.now().toString(),status:'pendente'},vals));
    saveS();render();showToast('✓ Item adicionado!');
  });
}
function editCEM(id){
  if(!canEdit())return;
  var it=(S.cemItems||[]).find(function(x){return x.id===id;});
  if(!it)return;
  showEditModal('Editar — Agenda CEM',[
    {label:'Responsável',key:'responsavel',val:it.responsavel||''},
    {label:'Assunto',key:'assunto',val:it.assunto||''},
    {label:'Data de Entrada',key:'data_entrada',val:it.data_entrada||''},
    {label:'Prazo',key:'prazo',val:it.prazo||''},
    {label:'Observações / Referências',key:'obs',val:it.obs||''},
  ],function(vals){
    Object.assign(it,vals);
    saveS();render();showToast('✓ Atualizado!');
  });
}
function delCEM(id){
  if(!confirm('Remover este item da Agenda CEM?'))return;
  S.cemItems=(S.cemItems||[]).filter(function(x){return x.id!==id;});
  saveS();render();showToast('✓ Removido!');
}
function expAgendaCEM(){
  var items=S.cemItems||[];
  var conc=items.filter(function(i){return i.status==='concluido';}).length;
  var rows=items.map(function(it,i){
    var dn=it.status==='concluido';
    return'<tr style="background:'+(dn?'#f0fdf4':i%2===0?'#f8fafc':'#fff')+';">'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;text-align:center;font-size:11px;">'+(i+1)+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;font-weight:600;font-size:11px;">'+esc(it.responsavel||'—')+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;font-size:11px;text-decoration:'+(dn?'line-through':'none')+';color:'+(dn?'#64748b':'inherit')+';">'+esc(it.assunto||'')+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;text-align:center;font-size:11px;">'+esc(it.data_entrada||'—')+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;text-align:center;font-size:11px;color:#92400e;">'+esc(it.prazo||'—')+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;font-size:11px;">'+esc(it.obs||'—')+'</td>'+
      '<td style="padding:5px 8px;border:1px solid #e2e8f0;text-align:center;">'+
        '<span style="background:'+(dn?'#d1fae5':'#fef3c7')+';color:'+(dn?'#065f46':'#92400e')+';padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;">'+(dn?'✔ Concluído':'⏳ Pendente')+'</span>'+

    '</tr>';
  }).join('');

    '<span>Total: <strong>'+items.length+'</strong></span>'+
    '<span style="color:#065f46">Concluídos: <strong>'+conc+'</strong></span>'+
    '<span style="color:#92400e">Pendentes: <strong>'+(items.length-conc)+'</strong></span>'+
  '</div>';
  abrirJanelaPDF('AGENDA CEM — COMPAAz',sumario+
    '<table style="width:100%;border-collapse:collapse;">'+
      '<thead><tr style="background:#1e3a8a;">'+
        '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;text-align:center;font-size:11px;">#</th>'+
        '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;font-size:11px;">Responsável</th>'+
        '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;font-size:11px;">Assunto</th>'+
        '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;text-align:center;font-size:11px;">Dt Entrada</th>'+
        '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;text-align:center;font-size:11px;">Prazo</th>'+
        '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;font-size:11px;">Observações</th>'+
        '<th style="padding:6px 8px;color:#fff;border:1px solid #1e3a8a;text-align:center;font-size:11px;">Status</th>'+
      '</tr></thead>'+
      '<tbody>'+rows+'</tbody>'+
    '</table>');
}
